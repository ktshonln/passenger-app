openapi: 3.1.0

info:
  title: Katisha User Service
  version: 1.0.0
  description: |
    Handles authentication, user management, organization management, and IAM for the Katisha platform.

    ## Authentication

    All protected endpoints require a valid JWT access token (15 min TTL).

    **Mobile clients** — include `X-Client-Type: mobile` and send `Authorization: Bearer <access_token>`.
    Tokens are returned in the response body.

    **Web clients** — the server sets `access_token` and `refresh_token` as `HttpOnly` cookies automatically.
    No `Authorization` header is needed; cookies are sent back with every request.

    ## Sessions & token lifetimes

    The access token is always 15 min. The **refresh token is a sliding idle window**
    (it rolls forward on every `POST /auth/refresh`), bounded by a hard **absolute cap**
    after which a full re-login is required. Lifetimes differ by client:

    | Client | Access | Refresh idle (sliding) | Absolute cap |
    |---|---|---|---|
    | Web (default) | 15 min | 8 h | 12 h |
    | Mobile (`X-Client-Type: mobile`) | 15 min | 30 d | 90 d |

    Once the absolute cap is reached, `POST /auth/refresh` returns `401 SESSION_EXPIRED`.

    **Revocation is enforced in real time** by the API gateway (Redis blacklist): `logout`,
    `logout-all`, account suspend/delete, and password change/reset invalidate the relevant
    access tokens immediately rather than waiting out the 15-min TTL.

    ## Localization

    Send the user's selected UI language as `X-Locale: rw | en | fr`. It is honoured on every
    request (including anonymous ones) and drives both responses and notifications (OTP, welcome,
    security alerts) for self-actions. Resolution precedence:
    `X-Locale` > the logged-in user's saved `locale` > `Accept-Language` > `rw`.

    ## IAM — Roles & Permissions

    Permissions are stored as **grant patterns** on roles in the database and packed into the JWT
    as CASL rules at login time. The `authorize(action, subject)` middleware checks rules at the
    route level; object-level scoping is enforced inside the service layer.

    Grant pattern format: `{subject}:{action}:{scope}` — e.g. `user:read:org`, `*:*:platform`.

    | Scope | Meaning |
    |---|---|
    | `own` | Caller can only act on their own record |
    | `org` | Caller can act on any record within their org |
    | `platform` | Unrestricted — all orgs |

    Built-in role slugs:

    | Role | Effective scope |
    |---|---|
    | `platform-admin` | `*:*:platform` — full access |
    | `org-admin` | `*:*:org` — full access within their org |
    | `dispatcher` | `user:invite:org`, `user:read:org`, `audit_log:read:org` |
    | `driver` | `user:read:own`, `user:update:own` |
    | `passenger` | `user:read:own`, `user:update:own` |

    ## Organization Types

    | `org_type` | Description | Parent required |
    |---|---|---|
    | `company` | Independent transport company | No |
    | `cooperative` | Collective transport organization | No |
    | `coop_member` | Individual owner-operator under a cooperative | Yes (`parent_org_id` → active cooperative) |

    A `coop_member` belongs to exactly one cooperative. The `parent_org_id` field is only
    meaningful for `coop_member` orgs. `company` and `cooperative` may not have a parent.

    ## Organization Application Flow (public, no auth)

    New organizations apply through a self-service flow:

    1. **Get presigned URLs** — `GET /organizations/apply/documents/presigned-url` twice
       (once per document type) and upload files directly to SeaweedFS.
    2. **Submit application** — `POST /organizations/apply` with document paths.
       Creates the org in `unverified` status and sends **separate** 6-digit OTPs to both
       `contact_phone` (SMS) and `contact_email` (email). For `coop_member`, also validates
       that `parent_org_id` points to an active `cooperative`.
    3. **Verify contact** — `POST /organizations/verify-contact` with the OTP and `channel`
       (`"phone"` or `"email"`). Verifying either channel promotes the org to `pending` and
       triggers notifications. For `coop_member`, the parent cooperative admins are notified
       in addition to Katisha platform admins.
    4. **(Optional) Resend OTP** — `POST /organizations/apply/resend-contact-otp`.

    ## Approval Flow by Org Type

    **`company` / `cooperative`** — single step:
    - Katisha admin: `PATCH /organizations/:id` `{ "status": "active" }` → creates invitation, sends `org_approved` notification

    **`coop_member`** — two steps:
    - Step 1 (cooperative): `POST /organizations/:id/cooperative-approve` → sets `cooperative_approved_at`, notifies Katisha admins
    - Step 2 (Katisha admin): `PATCH /organizations/:id` `{ "status": "active" }` → creates invitation, sends `org.member_approved` notification
    - Cooperative may also reject at step 1: `POST /organizations/:id/cooperative-reject`

    **Rejection (any type):**
    - Katisha admin: `PATCH /organizations/:id` `{ "status": "rejected", "rejection_reason": "..." }` → sends `org.rejected` notification

    ## Presigned URL Upload Pattern

    Avatar, logo, and document uploads never transit the Node.js server:

    1. Call the relevant `presigned-url` endpoint → receive `{ upload_url, path }`.
    2. `PUT` the file directly to `upload_url` with the **exact same** `Content-Type` header.
    3. Commit by sending `path` in the subsequent `PATCH` or `POST` body.

    The presigned URL expires in ~5 min (configurable via `S3_PRESIGNED_EXPIRES_IN`).
    The full CDN URL is never stored — build it client-side: `CDN_BASE_URL + "/" + path`.

    ## Login Channel

    Every user has a `login_channel` field (`"phone"` or `"email"`, initially `null`) that controls
    which identifier is accepted at `POST /auth/login`.

    - `null` — account created but not yet verified. Login sends an OTP and returns `requires_verification: true`.
    - `"phone"` — user must log in with their phone number. Using email returns `PHONE_LOGIN_REQUIRED` (403).
    - `"email"` — user must log in with their email. Using phone returns `EMAIL_LOGIN_REQUIRED` (403).

    **How `login_channel` is set:**

    | Action | Effect |
    |---|---|
    | `POST /auth/verify-phone` (first verification) | Sets `login_channel = "phone"`, activates account |
    | `POST /auth/verify-email` (first verification) | Sets `login_channel = "email"`, activates account |
    | `POST /auth/verify-login` | Sets `login_channel` to whichever channel the OTP was sent to |
    | `POST /users/me/login-channel` + confirm | Switches `login_channel` (and optionally updates the identifier) |

    **Changing the identifier (phone/email) via `PATCH /users/me`:**
    Direct updates to `email` are rejected (`LOGIN_CHANNEL_CHANGE_REQUIRED` 422) when that field
    is the current `login_channel`. Use `POST /users/me/login-channel` with an `identifier` instead —
    this changes the value, re-verifies it, and updates `login_channel` atomically.

    ## Notification Channel

    `notif_channel` is a **string array** (one or more of `sms`, `email`, `app`) that controls
    which channels security and lifecycle notifications are delivered to. Multiple values are allowed.

    | Value | Delivery |
    |---|---|
    | `sms` | SMS via phone number |
    | `email` | Email (only if `email` is set on account) |
    | `app` | FCM push (falls back to SMS if no `fcm_token` registered) |

    Default: `["sms"]` for passengers, `["sms", "email"]` for staff.
    Calling `POST /auth/register-device` registers an FCM token and switches `notif_channel` to `["app"]`.
    Update via `PATCH /users/me` with `{ "notif_channel": ["sms", "app"] }`.

    ## Push Notifications

    The mobile app obtains an FCM token from the Firebase SDK and registers it via
    `POST /auth/register-device`. Subsequent security events (new device login, password change,
    account suspension) and org lifecycle events are delivered based on `notif_channel`.

    ## Wallet

    Wallet balances are stored locally and kept in sync with payment events consumed from RabbitMQ.
    Read the balance with `GET /users/me/wallet` — no call to the payment service is needed.

    Top-ups use a two-step async pattern:

    1. `POST /users/me/wallet/topup` → returns `{ topup_id }` (202 Accepted).
    2. `GET /users/me/wallet/topup/{topup_id}/stream` → open SSE stream.

    The stream emits one named event (`completed`, `failed`, or `timeout`) and closes.
    See the **Wallet** tag for full sequence diagram, event-driven balance sync, and client example.

servers:
  - url: /api/v1
    description: Default base path

tags:
  - name: Auth
    description: |
      Registration, login, 2FA, password reset, token lifecycle, device registration.
      Start here — a valid access token is required by all other sections.
  - name: Organizations
    description: |
      Organization CRUD, two-step approval workflow, logo uploads.
      Understand and create organizations before inviting users into them.
  - name: Organization Applications
    description: |
      Public self-service flow for new organizations to apply for Katisha membership.
      No authentication required. Four ordered steps: upload documents → submit application → verify contact (phone or email) → (optional) resend OTP.
  - name: Users
    description: |
      User profiles, avatar uploads, staff invitations, 2FA, login channel management, and user administration.
      Requires an organization to exist before staff can be invited into it.
  - name: Roles
    description: |
      Role and grant management. Roles are collections of grant patterns (`subject:action:scope`).
      `is_managed` marks a platform-seeded role's **provenance** — it is **not** a freeze. Editing a
      managed/template role (`org_id: null`) as an `org-admin` transparently **forks an org-scoped
      copy** (copy-on-write, tracked via `override_of`/`is_customised`); `platform-admin` edits in place.
      `org-admin` can only manage roles within their own org.
  - name: Permissions
    description: |
      Read-only catalog of all valid permission subjects and actions.
      Use `GET /permissions` to build the pattern picker when creating or editing roles.
  - name: Wallet
    description: |
      Wallet balance and top-up flow via mobile money (MTN MoMo / Airtel Money).

      ## Balance storage

      The user-service maintains wallet balances **locally** in its own database. Balances
      are kept in sync by consuming `payment.events` messages published by the payment service
      to the `logs` RabbitMQ exchange. No synchronous call to the payment service is ever
      needed to read a balance.

      Events that affect balance:

      | Event | Effect |
      |---|---|
      | `topup.completed` | User balance **increased** by `amount` |
      | `ticket.payment.completed` (with `user_id`) | Passenger balance **decreased** by `amount` |
      | `ticket.payment.completed` (with `org_id`) | Organisation balance **decreased** by `amount` |
      | `ticket.refund.issued` (with `user_id`) | Passenger balance **increased** by `amount` |
      | `ticket.refund.issued` (with `org_id`) | Organisation balance **increased** by `amount` |

      ## Top-up flow

      Top-ups are **asynchronous**: the payment is processed by the payment service in the
      background. The user-service acts as a bridge between the client and the payment pipeline.

      ### Sequence

      ```
      Client                    user-service              payment-service
        │                            │                          │
        ├─ POST /wallet/topup ──────►│                          │
        │                            ├─ wallet.topup.requested ─► (RabbitMQ)
        │◄── 202 { topup_id } ───────┤                          │
        │                            │                          │ (processes MoMo push)
        ├─ GET /wallet/topup/:id/stream ──►│                    │
        │   (SSE connection opened)  │                          │
        │                            │◄── payment.events ───────┤ (RabbitMQ)
        │                            ├─ update user.balance     │
        │◄── event: confirmed ───────┤  (Redis pub/sub bridge)  │
        │    (SSE connection closed) │                          │
        │                            │                          │
        ├─ GET /users/me/wallet ─────►│                          │
        │◄── 200 { available: ... } ─┤ (reads from local DB)    │
      ```

      ### SSE Event Types

      The stream (`GET /users/me/wallet/topup/:id/stream`) emits **named SSE events**; each
      event name equals the `data.status`:

      | Event name | When | `data` |
      |---|---|---|
      | `pending` | On connect | `{ status:"pending" }` |
      | `confirmed` | Payment succeeded | `{ status, amount, currency, new_balance, message }` |
      | `failed` | Payment declined/errored | `{ status, reason, message, retryable:true }` |
      | `timeout` | No result within 3 minutes | `{ status:"timeout", message }` |

      The terminal outcome is also **persisted** (10-min TTL), so a client that connects (or
      reconnects) after the result is recorded replays it immediately — no lost events.

      ### Client implementation

      ```js
      // 1. Initiate the top-up
      const { topup_id } = await fetch('/api/v1/users/me/wallet/topup', {
        method: 'POST',
        body: JSON.stringify({ amount: 5000, phone: '+250788000001', payment_method: 'mtn' }),
      }).then(r => r.json());

      // 2. Open the SSE stream
      const es = new EventSource(`/api/v1/users/me/wallet/topup/${topup_id}/stream`);

      es.addEventListener('confirmed', (e) => {
        const { new_balance } = JSON.parse(e.data); // update UI without a refetch
        console.log('Top-up complete, new balance:', new_balance);
        es.close();
      });

      es.addEventListener('failed', (e) => {
        const { reason, message, retryable } = JSON.parse(e.data);
        console.error('Top-up failed:', reason, message); // retryable is always true
        es.close();
      });

      es.addEventListener('timeout', () => {
        console.warn('No confirmation — allow retry');
        es.close();
      });
      ```

      ### Ownership & security

      The SSE endpoint verifies that `topup_id` was issued by the authenticated user.
      A 404 is returned for unknown or foreign IDs.
  - name: Banks
    description: |
      Bank name registry used when organisations register their payout account details.

      Clients should fetch `GET /banks` once (e.g. at settings page load) and cache the
      list locally. Only offer `is_active: true` banks for new selections.

# ---------------------------------------------------------------------------
# Reusable components
# ---------------------------------------------------------------------------

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Mobile clients only — send `Authorization: Bearer <access_token>` with `X-Client-Type: mobile`.'
    CookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: Web clients only — set automatically by the server.

  parameters:
    ClientType:
      in: header
      name: X-Client-Type
      required: false
      schema:
        type: string
        enum: [mobile]
      description: |
        Omit for web clients (tokens returned as `HttpOnly` cookies).
        Send `mobile` to receive tokens in the JSON response body instead.

    Locale:
      in: header
      name: X-Locale
      required: false
      schema:
        type: string
        enum: [rw, en, fr]
      description: |
        The user's selected UI language. Honoured on every request (including anonymous
        ones) and used for both responses and notifications. Overrides the saved account
        locale for this request. Precedence: `X-Locale` > saved `locale` > `Accept-Language` > `rw`.

    SudoToken:
      in: header
      name: x-sudo-token
      required: true
      schema:
        type: string
      description: |
        Short-lived action-scoped JWT obtained from `POST /users/me/validate-password`.
        Valid for **3 minutes**, single-use. The token is bound to both the authenticated
        user and the specific action declared at issuance — a token minted for
        `delete_account` cannot be replayed on `change_password` or `purchase_ticket`.

        If missing or invalid the server returns `403` with header `x-sudo-required: true`
        and one of the following error codes:

        | Code | Reason |
        |---|---|
        | `STEP_UP_REQUIRED` | Header absent |
        | `STEP_UP_EXPIRED` | Token expired (> 3 min) |
        | `STEP_UP_INVALID` | Bad signature, wrong type, or wrong action |
        | `STEP_UP_MISMATCH` | Token belongs to a different user |
        | `STEP_UP_ALREADY_USED` | Token already consumed |

  schemas:

    # ── Error ─────────────────────────────────────────────────────────────────

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code]
          properties:
            code:
              type: string
              example: INVALID_CREDENTIALS
            message:
              type: string
              example: Invalid credentials

    # ── Auth ──────────────────────────────────────────────────────────────────

    AuthUser:
      type: object
      description: Minimal user object returned alongside tokens on every successful auth response.
      properties:
        id:                 { type: string, format: uuid, example: 'a1b2c3d4-0000-0000-0000-000000000001' }
        first_name:         { type: string, example: Jean }
        last_name:          { type: string, example: Uwimana }
        user_type:          { type: string, enum: [passenger, staff] }
        avatar_path:        { type: string, nullable: true, example: null }
        org_id:             { type: string, format: uuid, nullable: true, example: null }
        roles:
          type: array
          items: { type: string }
          example: [org-admin]
        status:             { type: string, enum: [active, pending_verification, suspended], example: active }
        two_factor_enabled: { type: boolean, example: false }
        login_channel:
          type: string
          enum: [phone, email]
          nullable: true
          example: phone
          description: |
            The channel the user logs in with. `null` until first OTP verification.
            `"phone"` — login identifier must be a phone number.
            `"email"` — login identifier must be an email address.
            Using the wrong identifier at login returns `PHONE_LOGIN_REQUIRED` or `EMAIL_LOGIN_REQUIRED` (403).
        locale:             { type: string, enum: [rw, en, fr], example: rw, description: 'Preferred notification language.' }

    Tokens:
      type: object
      description: |
        Present in the JSON body **only** for mobile clients (`X-Client-Type: mobile`).
        For web clients tokens are delivered as `HttpOnly` cookies and omitted from the body.
      properties:
        access_token:
          type: string
          description: 'Short-lived JWT (15 min). Send as `Authorization: Bearer` on subsequent requests.'
        refresh_token:
          type: string
          description: |
            Opaque token; rotate via `POST /auth/refresh`. Sliding idle window —
            8 h (web) / 30 d (mobile) — bounded by an absolute cap of 12 h (web) / 90 d (mobile).

    AuthResponse:
      type: object
      properties:
        user:   { $ref: '#/components/schemas/AuthUser' }
        tokens: { $ref: '#/components/schemas/Tokens' }

    # ── User ──────────────────────────────────────────────────────────────────

    CaslRule:
      type: object
      description: |
        A single CASL rule packed into the JWT at login. The frontend can use these to gate
        UI elements without extra API calls. Never rely on client-side rule evaluation for
        security decisions — the server re-enforces them on every request.
      properties:
        action:
          type: string
          example: update
        subject:
          type: string
          example: User
        conditions:
          type: object
          nullable: true
          description: 'Object-level scope, e.g. `{ "org_id": "uuid" }` (org scoping) or `{ "id": "userId" }` (self-only).'
          example: { org_id: 'uuid' }
        inverted:
          type: boolean
          nullable: true

    UserMePassenger:
      type: object
      description: Profile returned by `GET /users/me` and `PATCH /users/me` for passenger accounts.
      properties:
        id:               { type: string, format: uuid }
        first_name:       { type: string }
        last_name:        { type: string }
        phone_number:     { type: string, example: '+250780000001' }
        phone_verified_at: { type: string, format: date-time, nullable: true }
        email:
          type: string
          format: email
          nullable: true
          description: Always null for passengers — email is a staff-only field.
        email_verified_at: { type: string, format: date-time, nullable: true }
        avatar_path:      { type: string, nullable: true }
        user_type:        { type: string, enum: [passenger] }
        status:           { type: string, enum: [active, pending_verification, suspended] }
        login_channel:
          type: string
          enum: [phone, email]
          nullable: true
          example: phone
          description: |
            Active login channel. `null` until first OTP verification.
            Use `POST /users/me/login-channel` to switch between `phone` and `email`,
            or to change the actual phone number / email while switching.
        notif_channel:
          type: array
          items: { type: string, enum: [sms, email, app] }
          description: |
            Controls which channel(s) are used for security and lifecycle notifications.
            Multiple values are allowed. Defaults to `["sms"]` for passengers. Automatically
            switches to `["app"]` when an FCM token is registered via `POST /auth/register-device`.
            Update via `PATCH /users/me` with `{ "notif_channel": ["sms", "app"] }`.
          example: [sms]
        locale:           { type: string, enum: [rw, en, fr], example: rw, description: 'Preferred notification language. Update via PATCH /users/me.' }
        two_factor_enabled: { type: boolean, example: false }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    UserMeStaff:
      type: object
      description: Profile returned by `GET /users/me` and `PATCH /users/me` for staff accounts. Includes roles and packed CASL rules.
      properties:
        id:               { type: string, format: uuid }
        first_name:       { type: string }
        last_name:        { type: string }
        phone_number:     { type: string, nullable: true, example: '+250780000001' }
        phone_verified_at: { type: string, format: date-time, nullable: true }
        email:            { type: string, format: email, nullable: true }
        email_verified_at: { type: string, format: date-time, nullable: true }
        avatar_path:      { type: string, nullable: true }
        user_type:        { type: string, enum: [staff] }
        status:           { type: string, enum: [active, pending_verification, suspended] }
        org_id:           { type: string, format: uuid, nullable: true }
        roles:
          type: array
          items: { type: string }
          example: [org-admin]
        permissions:
          type: array
          items: { $ref: '#/components/schemas/CaslRule' }
          description: Packed CASL rules derived from this user's DB role-permission assignments. Use for frontend feature-flag rendering.
        login_channel:
          type: string
          enum: [phone, email]
          nullable: true
          example: email
          description: |
            Active login channel. `null` until first OTP verification.
            Use `POST /users/me/login-channel` to switch between `phone` and `email`,
            or to change the actual phone number / email while switching.
        notif_channel:
          type: array
          items: { type: string, enum: [sms, email, app] }
          description: |
            Controls notification delivery. Multiple values are allowed.
            Defaults to `["sms", "email"]` for staff. Automatically switches to `["app"]`
            when an FCM token is registered. Update via `PATCH /users/me`.
          example: [sms, email]
        locale:           { type: string, enum: [rw, en, fr], example: rw, description: 'Preferred notification language. Update via PATCH /users/me.' }
        two_factor_enabled: { type: boolean, example: false }
        driver_license_number:      { type: string, nullable: true }
        driver_license_verified_at: { type: string, format: date-time, nullable: true }
        last_login_at:    { type: string, format: date-time, nullable: true }
        created_at:       { type: string, format: date-time }
        updated_at:       { type: string, format: date-time }

    UserListItem:
      type: object
      description: Compact user row returned by `GET /users`.
      properties:
        id:           { type: string, format: uuid }
        first_name:   { type: string }
        last_name:    { type: string }
        email:        { type: string, format: email, nullable: true }
        phone_number:
          type: string
          nullable: true
          description: Masked (`+250788***456`) for non-platform callers; full number at platform scope.
        avatar_path:  { type: string, nullable: true }
        user_type:    { type: string, enum: [passenger, staff] }
        status:       { type: string, enum: [active, pending_verification, suspended, pending_deletion] }
        roles:
          type: array
          items: { type: string }
        org_id:       { type: string, format: uuid, nullable: true }
        last_login_at:
          type: string
          format: date-time
          nullable: true
          description: Always included.
        created_at:   { type: string, format: date-time }

    UserFullProfile:
      type: object
      description: Full user profile returned by `GET /users/:id` and `PATCH /users/:id`.
      properties:
        id:               { type: string, format: uuid }
        first_name:       { type: string }
        last_name:        { type: string }
        phone_number:     { type: string, nullable: true }
        phone_verified_at: { type: string, format: date-time, nullable: true }
        email:            { type: string, format: email, nullable: true }
        email_verified_at: { type: string, format: date-time, nullable: true }
        avatar_path:      { type: string, nullable: true }
        user_type:        { type: string, enum: [passenger, staff] }
        status:           { type: string, enum: [active, pending_verification, suspended, pending_deletion] }
        org_id:           { type: string, format: uuid, nullable: true }
        roles:
          type: array
          items: { type: string }
          description: Role slugs assigned to this user.
        grants:
          type: array
          description: Direct grant patterns assigned to this user (outside of roles).
          items: { $ref: '#/components/schemas/Grant' }
        login_channel:
          type: string
          enum: [phone, email]
          nullable: true
          example: phone
          description: Active login channel. Determines which identifier is accepted at login.
        notif_channel:
          type: array
          items: { type: string, enum: [sms, email, app] }
          example: [sms, email]
        locale:           { type: string, enum: [rw, en, fr], example: rw }
        two_factor_enabled: { type: boolean, example: false }
        driver_license_number:
          type: string
          nullable: true
          description: Visible to any reader with `read:User` (org scope or broader).
        driver_license_verified_at:
          type: string
          format: date-time
          nullable: true
          description: Visible to any reader with `read:User` (org scope or broader).
        last_login_at:
          type: string
          format: date-time
          nullable: true
          description: Visible to any reader with `read:User` (org scope or broader).
        created_at:  { type: string, format: date-time }
        updated_at:  { type: string, format: date-time }

    # ── Organization ──────────────────────────────────────────────────────────

    OrgCreated:
      type: object
      description: Response body for `POST /organizations`. Lighter shape — logo and approval fields are not set yet.
      properties:
        id:                   { type: string, format: uuid }
        name:                 { type: string }
        slug:                 { type: string, description: URL-safe version of name, auto-generated. }
        org_type:             { type: string, enum: [company, cooperative, coop_member] }
        status:               { type: string, enum: [unverified, pending, active, suspended, rejected] }
        contact_first_name:   { type: string, example: Jane }
        contact_last_name:    { type: string, example: Doe }
        contact_email:        { type: string, format: email }
        contact_phone:        { type: string }
        parent_org_id:        { type: string, format: uuid, nullable: true }
        story:                { type: string, nullable: true, description: Free-form text the org provided about themselves. }
        created_at:           { type: string, format: date-time }

    OrgListItem:
      type: object
      description: Compact org row returned by `GET /organizations`.
      properties:
        id:                          { type: string, format: uuid }
        name:                        { type: string }
        slug:                        { type: string }
        org_type:                    { type: string, enum: [company, cooperative, coop_member] }
        status:                      { type: string, enum: [unverified, pending, active, suspended, rejected] }
        logo_path:                   { type: string, nullable: true }
        contact_first_name:          { type: string, example: Jane }
        contact_last_name:           { type: string, example: Doe }
        contact_email:               { type: string, format: email }
        contact_phone:               { type: string }
        contact_phone_verified_at:   { type: string, format: date-time, nullable: true }
        contact_email_verified_at:   { type: string, format: date-time, nullable: true }
        parent_org_id:               { type: string, format: uuid, nullable: true }
        cancellations_allowed:       { type: boolean }
        cooperative_approved_at:     { type: string, format: date-time, nullable: true, description: 'Set when the parent cooperative pre-approves a coop_member.' }
        approved_at:                 { type: string, format: date-time, nullable: true }
        bank_id:                     { type: string, format: uuid, nullable: true }
        account_number:              { type: string, nullable: true, example: '00011234567' }
        created_at:                  { type: string, format: date-time }

    OrgFull:
      type: object
      description: |
        Full organization detail. Returned by `GET /organizations/:id`, `GET /organizations/me`,
        `PATCH /organizations/:id`, `POST /organizations/:id/cooperative-approve`.
        Some fields are omitted for non-admin callers (see field descriptions).
      properties:
        id:                          { type: string, format: uuid }
        name:                        { type: string }
        slug:                        { type: string }
        org_type:                    { type: string, enum: [company, cooperative, coop_member] }
        status:                      { type: string, enum: [unverified, pending, active, suspended, rejected] }
        logo_path:                   { type: string, nullable: true }
        contact_first_name:          { type: string, example: Jane }
        contact_last_name:           { type: string, example: Doe }
        contact_email:               { type: string, format: email }
        contact_phone:               { type: string }
        contact_phone_verified_at:   { type: string, format: date-time, nullable: true, description: 'Set when contact verifies via phone OTP.' }
        contact_email_verified_at:   { type: string, format: date-time, nullable: true, description: 'Set when contact verifies via email OTP.' }
        address:                     { type: string, nullable: true }
        tin:                         { type: string, nullable: true }
        license_number:              { type: string, nullable: true }
        story:                       { type: string, nullable: true, description: Free-form text the org provided about themselves. }
        cancellations_allowed:       { type: boolean, description: 'Whether this org permits passengers to cancel tickets. Defaults to true. Settable by org-admin or platform admin.' }
        parent_org_id:               { type: string, format: uuid, nullable: true }
        parent_org:
          nullable: true
          type: object
          properties:
            id:     { type: string, format: uuid }
            name:   { type: string }
            slug:   { type: string }
            status: { type: string }
        child_orgs:
          type: array
          description: Admin only — omitted for non-admin callers.
          items:
            type: object
            properties:
              id:     { type: string, format: uuid }
              name:   { type: string }
              slug:   { type: string }
              status: { type: string }
        cooperative_approved_at:
          type: string
          format: date-time
          nullable: true
          description: Set when a cooperative pre-approves a coop_member (step 1 of 2). Always null for company/cooperative orgs.
        approved_by:
          type: string
          format: uuid
          nullable: true
          description: Admin only — UUID of the platform-admin who ran the final approval.
        cooperative_approved_by:
          type: string
          format: uuid
          nullable: true
          description: >
            UUID of the cooperative staff member who ran the pre-approval. Visible to
            org-wide readers (so a cooperative can see which of its users approved a member),
            unlike `child_orgs`/`approved_by` which are platform-only.
        approved_at:    { type: string, format: date-time, nullable: true }
        bank_id:        { type: string, format: uuid, nullable: true }
        account_number: { type: string, nullable: true, example: '00011234567', description: '8–20 digit bank account number.' }
        created_at:     { type: string, format: date-time }
        updated_at:     { type: string, format: date-time }

    Bank:
      type: object
      description: A bank available for selection when an organization sets up their payout account.
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string, example: 'Equity Bank' }
        is_active:  { type: boolean, description: 'Inactive banks remain in the list but should not be offered for new selections.' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # ── Devices & Sessions ────────────────────────────────────────────────────

    UserDevice:
      type: object
      description: An FCM-registered device belonging to the authenticated user.
      properties:
        id:                { type: string, format: uuid }
        device_name:       { type: string, nullable: true, example: 'iPhone 15 Pro', description: 'Friendly name sent by the app at registration. Null if omitted.' }
        fcm_token_preview: { type: string, example: '****************************abc123', description: 'FCM token with all but the last 6 characters masked. The real token is never returned.' }
        registered_at:     { type: string, format: date-time }
        last_active_at:    { type: string, format: date-time, nullable: true, description: 'Last time a push notification was sent to this device. Null if never notified.' }

    Session:
      type: object
      description: An active refresh-token session.
      properties:
        id:            { type: string, format: uuid, description: 'Session ID — use with `DELETE /auth/sessions/{id}` to revoke.' }
        device_name:   { type: string, nullable: true, example: 'Chrome on macOS', description: 'Device/browser name captured at login. Null if not provided.' }
        created_at:    { type: string, format: date-time, description: 'When this session was first created (login time).' }
        last_used_at:  { type: string, format: date-time, nullable: true, description: 'When this session last refreshed its tokens. Null if never refreshed.' }
        is_current:    { type: boolean, description: 'True when this session matches the access token used to make this request.' }

    OrgPublicListItem:
      type: object
      description: Slim, public-safe org row returned by `GET /organizations/public`.
      properties:
        id:       { type: string, format: uuid }
        name:     { type: string }
        slug:     { type: string }
        org_type: { type: string, enum: [company, cooperative, coop_member] }
        logo_path: { type: string, nullable: true }

    # ── IAM ───────────────────────────────────────────────────────────────────

    Grant:
      type: object
      description: A single grant pattern assigned to a role.
      properties:
        id:           { type: string, format: uuid }
        pattern:
          type: string
          example: 'user:read:org'
          description: '`{subject}:{action}:{scope}` — e.g. `user:read:org`, `*:*:platform`. Use `GET /permissions` for valid subjects/actions.'
        is_managed:
          type: boolean
          description: >
            Provenance flag for a platform-seeded grant (advisory). Not a hard lock —
            removing it from a template forks an org-scoped copy (copy-on-write).
        created_at:   { type: string, format: date-time }

    Role:
      type: object
      description: A named collection of grant patterns.
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string, example: 'Document Reviewer' }
        slug:         { type: string, example: 'document-reviewer' }
        description:  { type: string, nullable: true }
        org_id:       { type: string, format: uuid, nullable: true, description: 'null for platform-wide template roles.' }
        is_managed:
          type: boolean
          description: >
            Provenance flag, **not** a freeze. Editing a managed/template role as an org-admin
            transparently forks an org-scoped copy (copy-on-write); platform admins edit in place.
        override_of:
          type: string
          format: uuid
          nullable: true
          description: For an org's copy of a platform default, the id of the default it forks; null otherwise.
        is_customised:
          type: boolean
          description: 'true when `override_of` is set (the org has customised a platform default).'
        created_at:   { type: string, format: date-time }
        grants:
          type: array
          items: { $ref: '#/components/schemas/Grant' }

    Permission:
      type: object
      description: A single entry from the permission catalog — valid (subject, action) pairs recognized by the platform.
      properties:
        id:           { type: string, format: uuid }
        code:         { type: string, example: 'user:read', description: 'Canonical identifier. Use as the `subject:action` part of a grant pattern.' }
        action:       { type: string, example: 'read' }
        subject:      { type: string, example: 'User' }
        display_name: { type: string, example: 'View users' }
        description:  { type: string, example: 'Read user profile information', nullable: true }
        group:        { type: string, example: 'User management' }
        scopes:
          type: array
          items:
            type: string
            enum: [own, org, platform]
          example: ['own', 'org', 'platform']
          description: 'Valid scope suffixes for this permission. Use these to construct grant patterns: `"{code}:{scope}"`. Not all permissions support all scopes — e.g. `org:create` is `platform`-only.'

    # ── Wallet ────────────────────────────────────────────────────────────────

    InvitationFull:
      type: object
      description: A single pending invitation with its roles and staged direct grants.
      required: [id, first_name, last_name, role_slugs, grants, org_id, invited_by, expires_at, expired, created_at]
      properties:
        id:           { type: string, format: uuid }
        first_name:   { type: string }
        last_name:    { type: string }
        email:        { type: string, format: email, nullable: true }
        phone_number: { type: string, nullable: true }
        role_slugs:
          type: array
          items: { type: string }
        grants:
          type: array
          description: Staged direct grants — materialised onto the user on accept.
          items:
            type: object
            properties:
              id:         { type: string, format: uuid }
              pattern:    { type: string, example: 'user:read:org' }
              created_at: { type: string, format: date-time }
        org_id:       { type: string, format: uuid, nullable: true }
        invited_by:   { type: string, format: uuid }
        expires_at:   { type: string, format: date-time }
        expired:      { type: boolean, description: 'true when expires_at is in the past.' }
        created_at:   { type: string, format: date-time }

    TopupInitiated:
      type: object
      description: Returned immediately after a wallet top-up is accepted for processing.
      required: [topup_id]
      properties:
        topup_id:
          type: string
          format: uuid
          example: d3f8a1b2-0000-0000-0000-000000000042
          description: >
            Identifier for this top-up. Use it to open the SSE stream
            (`GET /users/me/wallet/topup/{topup_id}/stream`).

    TopupEvent:
      type: object
      description: |
        Payload delivered as the SSE `data` field. The named `event` equals `status`.
        Parse with `JSON.parse(event.data)`.
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, failed, timeout]
          example: confirmed
        amount:
          type: integer
          example: 5000
          description: Amount confirmed (RWF) — present on `confirmed`.
        currency:
          type: string
          example: RWF
          description: Present on `confirmed`.
        new_balance:
          type: integer
          example: 15000
          description: Updated wallet balance — present on `confirmed`; lets the UI update without a refetch.
        reason:
          type: string
          example: MOMO_DECLINED
          description: Raw provider failure code — present on `failed`.
        retryable:
          type: boolean
          example: true
          description: Always `true` on `failed` — a retry is a fresh `POST /topup` (new `topup_id`).
        message:
          type: string
          description: Human-readable message — present on `confirmed`, `failed`, and `timeout`.
          example: Your wallet has been topped up successfully.

    Transaction:
      type: object
      description: A single wallet ledger entry (settled movement) from the transaction history.
      required: [id, type, amount, currency, description, created_at, reference, ticket_id, balance_after]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [topup, ticket_payment, refund]
          description: |
            The movement's source.
            - `topup` — passenger topped up via MoMo
            - `ticket_payment` — wallet debited for a ticket purchase
            - `refund` — money returned after a cancelled/refunded ticket
        amount:
          type: integer
          description: Amount in RWF.
          example: 1500
        currency:
          type: string
          example: RWF
        description:
          type: string
          description: >
            Human-readable one-liner for direct UI display. Top-ups show the MoMo method
            when known (e.g. `Top up via MTN`); otherwise `Wallet top-up`. Ticket movements
            show `Ticket payment` / `Ticket refund`.
          example: Top up via MTN
        created_at:
          type: string
          format: date-time
        reference:
          type: string
          nullable: true
          description: Canonical payment reference for the movement.
        ticket_id:
          type: string
          format: uuid
          nullable: true
          description: Set for `ticket_payment` / `refund` so the UI can deep-link; `null` for top-ups.
        balance_after:
          type: integer
          description: Running wallet balance immediately after this movement (RWF).
          example: 6600

    TransactionList:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Transaction' }
        total: { type: integer, example: 47 }
        page:  { type: integer, example: 1 }
        limit: { type: integer, example: 20 }

  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: UNAUTHORIZED }
    Forbidden:
      description: Authenticated but insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: FORBIDDEN }
    OrgBillingOverdue:
      description: >
        The organisation's account is billing-overdue. All mutating operations
        are suspended until the outstanding balance is settled. Read operations
        (GET) and authentication endpoints (logout, refresh) remain available.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: ORG_BILLING_OVERDUE, message: Your organisation account is suspended due to an outstanding balance. Please settle the payment to restore access. }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: NOT_FOUND }
    UnprocessableEntity:
      description: Request body failed Joi validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: VALIDATION_ERROR, message: '"phone_number" must be in E.164 format' }
    ValidationError:
      description: Request body failed Joi validation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: VALIDATION_ERROR, message: '"phone_number" must be in E.164 format' }
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error: { code: TOO_MANY_REQUESTS, message: 'Rate limit exceeded' }
    StepUpRequired:
      description: |
        Sudo token missing, expired, invalid, action-mismatched, or already used.
        The response always includes the header `x-sudo-required: true` so clients
        can distinguish this 403 from a permission-based `FORBIDDEN`.
      headers:
        x-sudo-required:
          schema: { type: string, enum: ['true'] }
          description: Always `true` on this response — signals the client to prompt for password re-entry.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            missing:
              summary: Header absent
              value: { error: { code: STEP_UP_REQUIRED } }
            expired:
              summary: Token expired
              value: { error: { code: STEP_UP_EXPIRED } }
            invalid:
              summary: Bad signature / wrong action
              value: { error: { code: STEP_UP_INVALID } }
            already_used:
              summary: Token already consumed
              value: { error: { code: STEP_UP_ALREADY_USED } }

# ---------------------------------------------------------------------------
# Default security (override per-endpoint where needed)
# ---------------------------------------------------------------------------

security:
  - BearerAuth: []
  - CookieAuth: []

# ---------------------------------------------------------------------------
# Paths — ordered by dependency: Auth → Organizations → Org Applications → Users
#
# Within each group: creation/discovery first, then operations that depend on
# the created resource, then deletion/cleanup last.
# ---------------------------------------------------------------------------

paths:

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  AUTH                                                                    ║
  # ║  Step 1: create an account. Step 2: activate it. Step 3: log in.        ║
  # ║  Everything else requires a valid access token from one of these flows. ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new passenger account
      description: |
        Creates a `passenger` account in `pending_verification` status.
        On success, sends **separate** 6-digit OTPs per channel:
        - **Phone OTP** → always sent via SMS (`phone_verification` purpose)
        - **Email OTP** → only if `email` provided, distinct code via email (`email_verification` purpose)

        The account cannot log in until at least one channel is verified.
        The first channel verified sets `login_channel` and activates the account.
        After verifying, call `POST /auth/login` to obtain tokens.

        Staff accounts are provisioned via `POST /users/invite` (admin-only flow).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, phone_number, password]
              properties:
                first_name:   { type: string, maxLength: 100 }
                last_name:    { type: string, maxLength: 100 }
                phone_number: { type: string, pattern: '^\+\d{7,15}$', example: '+250780000001', description: E.164 format required. }
                email:        { type: string, format: email, maxLength: 255, description: 'Optional. If provided, the OTP is also delivered here and `notif_channel` defaults to `[sms, email]`.' }
                locale:
                  type: string
                  enum: [rw, en, fr]
                  default: rw
                  description: 'Language preference for notifications. Defaults to `rw` (Kinyarwanda).'
                password:     { type: string, minLength: 8, maxLength: 128 }
      responses:
        '201':
          description: Account created — OTP sent to phone (and email if provided)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                    description: Pass to `POST /auth/verify-phone`.
                  expires_in:
                    type: integer
                    description: OTP TTL in seconds (default 300 = 5 min).
                    example: 300
        '409':
          description: Phone number or email already registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                phone_exists: { value: { error: { code: PHONE_ALREADY_EXISTS } } }
                email_exists: { value: { error: { code: EMAIL_ALREADY_EXISTS } } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/verify-phone:
    post:
      tags: [Auth]
      summary: Verify phone number (standalone — no tokens)
      description: |
        Verifies the phone OTP. On first verification (account `pending_verification`):
        activates the account and sets `login_channel` to `phone`.

        **Does not issue tokens.** Returns `login_identifier` so the client can direct
        the user to the login screen with the correct identifier pre-filled.

        If the account was already active (email verified first), only stamps `phone_verified_at`.
        The user can then switch to phone login via `POST /users/me/login-channel`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, otp]
              properties:
                user_id: { type: string, format: uuid }
                otp:     { type: string, minLength: 6, maxLength: 6, description: 6-digit code sent to phone. }
      responses:
        '200':
          description: Phone verified — proceed to login
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:          { type: string, example: 'Phone verified. Please log in with your phone number.' }
                  login_identifier: { type: string, example: '+250780000001' }
        '400':
          description: Invalid OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: INVALID_OTP } }
        '410':
          description: OTP expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: OTP_EXPIRED } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email address (standalone — no tokens)
      description: |
        Verifies the email OTP. On first verification (account `pending_verification`):
        activates the account and sets `login_channel` to `email`.

        **Does not issue tokens.** Returns `login_identifier` so the client can direct
        the user to the login screen.

        If the account was already active (phone verified first), only stamps `email_verified_at`.
        The user can then switch to email login via `POST /users/me/login-channel`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, otp]
              properties:
                user_id: { type: string, format: uuid }
                otp:     { type: string, minLength: 6, maxLength: 6, description: 6-digit code sent to email. }
      responses:
        '200':
          description: Email verified — proceed to login
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:          { type: string, example: 'Email verified. Please log in with your email.' }
                  login_identifier: { type: string, example: 'user@company.com' }
        '400':
          description: Invalid OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Email already verified
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: EMAIL_ALREADY_VERIFIED } }
        '410':
          description: OTP expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/verify-login:
    post:
      tags: [Auth]
      parameters:
        - $ref: '#/components/parameters/ClientType'
      summary: Complete login-triggered OTP verification (issues tokens)
      description: |
        Called after `POST /auth/login` returns `{ requires_verification: true }`.

        Verifies the OTP sent to the channel the user logged in with, activates the account,
        sets `login_channel`, and issues the first token pair. This is the **only** verification
        endpoint that returns tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, otp, channel]
              properties:
                user_id:     { type: string, format: uuid }
                otp:         { type: string, minLength: 6, maxLength: 6 }
                channel:     { type: string, enum: [phone, email], description: Must match the channel returned by POST /auth/login. }
                device_name: { type: string, maxLength: 200 }
      responses:
        '200':
          description: Verified — tokens issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400':  { description: Invalid OTP, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '404':  { description: User not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409':  { description: Account already verified, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '410':  { description: OTP expired, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '422':  { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/invite/validate:
    get:
      tags: [Auth]
      summary: Validate an invite token (frontend pre-check)
      description: |
        Called by the frontend when the invite page loads (before showing the set-password form).

        The invite URL sent to users has the format:
        ```
        <APP_URL>/i?t=<raw_token>
        ```
        Extract the `t` query parameter and pass it here as `token`.

        Returns masked contact details so the user knows who the invite is for.
        Returns `404` if the token is invalid or already used, `410` if expired.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
          description: 'Raw invite token — the value of the `t` query parameter from the invite URL.'
      responses:
        '200':
          description: Token valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:        { type: boolean, enum: [true] }
                  first_name:   { type: string }
                  channels:     { type: array, items: { type: string, enum: [phone, email] } }
                  masked_phone: { type: string, nullable: true, example: '+250780***001' }
                  masked_email: { type: string, nullable: true, example: 'us***@company.com' }
        '404': { description: Token not found or already used, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '410': { description: Token expired, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with phone or email + password
      parameters:
        - $ref: '#/components/parameters/ClientType'
        - $ref: '#/components/parameters/Locale'
      description: |
        Accepts a phone number in E.164 format or an email address as `identifier`.
        Session lifetimes depend on `X-Client-Type` (see **Sessions & token lifetimes**).

        **Normal** → `200` with full `AuthResponse`.

        **Account pending verification** → `202` with `{ requires_verification: true, user_id, channel, expires_in }`.
        An OTP is sent to the channel the user logged in with. Follow up with `POST /auth/verify-login`.

        **2FA enabled** → `202` with `{ requires_2fa: true, user_id, expires_in }`.
        An OTP is sent to the user's phone. Follow up with `POST /auth/verify-2fa`.

        **Wrong login channel** → `403` with `PHONE_LOGIN_REQUIRED` or `EMAIL_LOGIN_REQUIRED`
        if the user tries to log in via a channel that is not their `login_channel`.

        Rate-limited to **5 attempts per 15 min per IP** by default.
        Configurable via `RATE_LIMIT_LOGIN_MAX` and `RATE_LIMIT_LOGIN_WINDOW_SECONDS`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, password, user_type]
              properties:
                identifier:  { type: string, example: '+250780000001', description: 'Phone number (E.164) or email address.' }
                password:    { type: string, minLength: 8, maxLength: 128 }
                user_type:   { type: string, enum: [passenger, staff], description: 'Must match the account type — the same phone/email may exist for both passenger and staff.' }
                device_name: { type: string, maxLength: 200 }
      responses:
        '200':
          description: Login successful — tokens issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '202':
          description: |
            Two cases — inspect the response body to distinguish:

            **Account pending verification** — `login_channel` is `null` (never verified).
            An OTP is sent to the channel the user logged in with. Follow up with `POST /auth/verify-login`.
            ```
            { requires_verification: true, user_id, channel: "phone"|"email", expires_in }
            ```

            **2FA required** — account is active and 2FA is enabled.
            An OTP is sent to the user's phone. Follow up with `POST /auth/verify-2fa`.
            ```
            { requires_2fa: true, user_id, expires_in }
            ```
          content:
            application/json:
              schema:
                type: object
                properties:
                  requires_verification: { type: boolean, enum: [true], description: Present when account has not yet been verified. }
                  requires_2fa:          { type: boolean, enum: [true], description: Present when 2FA is enabled on the account. }
                  user_id:               { type: string, format: uuid }
                  channel:               { type: string, enum: [phone, email], description: Channel the OTP was sent to. Present when requires_verification is true. }
                  expires_in:            { type: integer, example: 300, description: OTP TTL in seconds. }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: INVALID_CREDENTIALS } }
        '403':
          description: |
            One of:
            - `ACCOUNT_SUSPENDED` — account is suspended
            - `PHONE_LOGIN_REQUIRED` — identifier was an email but `login_channel` is `phone`
            - `EMAIL_LOGIN_REQUIRED` — identifier was a phone number but `login_channel` is `email`
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: RATE_LIMIT_EXCEEDED } }

  /auth/verify-2fa:
    post:
      tags: [Auth]
      summary: Complete 2FA login
      parameters:
        - $ref: '#/components/parameters/ClientType'
      description: |
        Step 2 when `POST /auth/login` returns `requires_2fa: true`.
        Verifies the OTP sent to the user's phone and issues tokens. The OTP is single-use.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, otp]
              properties:
                user_id:     { type: string, format: uuid }
                otp:         { type: string, minLength: 6, maxLength: 6 }
                device_name: { type: string, maxLength: 200 }
      responses:
        '200':
          description: 2FA verified — tokens issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400':
          description: Invalid OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: OTP_INVALID } }
        '410':
          description: OTP expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: OTP_EXPIRED } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password-reset OTP
      description: |
        Sends a 6-digit OTP to the user's phone or email depending on whether `identifier` is
        a phone number or email address. The OTP message uses the `X-Locale` language when sent.

        Always returns `204` regardless of whether the identifier exists — this prevents
        user enumeration attacks.

        Rate-limited to **3 attempts per hour per IP** by default.
        Configurable via `RATE_LIMIT_RESET_MAX` and `RATE_LIMIT_RESET_WINDOW_SECONDS`.
      security: []
      parameters:
        - $ref: '#/components/parameters/Locale'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier]
              properties:
                identifier: { type: string, example: '+250780000001', description: 'Phone number (E.164) or email address.' }
      responses:
        '204': { description: OTP sent (or silently ignored if identifier not found) }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: RATE_LIMIT_EXCEEDED } }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with OTP
      description: |
        Verifies the OTP issued by `POST /auth/forgot-password` and sets a new password.
        All sessions are revoked immediately — refresh tokens revoked and the user
        blacklisted so in-flight access tokens are rejected at once. The user must log in
        again with the new password (no tokens are returned here).
        A `security.password_changed` notification is sent via SMS, email, and push.
      security: []
      parameters:
        - $ref: '#/components/parameters/Locale'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier, otp, new_password]
              properties:
                identifier:   { type: string, description: Same identifier used for forgot-password. }
                otp:          { type: string, minLength: 6, maxLength: 6 }
                new_password: { type: string, minLength: 8, maxLength: 128 }
      responses:
        '204': { description: Password updated — all sessions revoked }
        '400':
          description: Invalid OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: OTP_INVALID } }
        '410':
          description: OTP expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: OTP_EXPIRED } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token
      description: |
        Issues a new access + refresh token pair and invalidates the old refresh token.
        The refresh token is a **sliding window** — each rotation resets the idle timer,
        but the session's **absolute cap** (12 h web / 90 d mobile) is carried forward
        unchanged. Once the cap is reached, rotation fails with `401 SESSION_EXPIRED` and
        the user must log in again.

        **Mobile** — send `Authorization: Bearer <refresh_token>` with `X-Client-Type: mobile`.

        **Web** — the refresh token is read from the `refresh_token` cookie automatically.

        **Reuse detection:** if an already-revoked token is submitted, all sessions for that
        user are wiped and a `security.all_sessions_revoked` notification is sent via SMS and push.
      security: []
      parameters:
        - $ref: '#/components/parameters/ClientType'
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens: { $ref: '#/components/schemas/Tokens' }
        '401':
          description: |
            Refresh token missing, invalid, or the user is suspended. Specific codes:
            `INVALID_REFRESH_TOKEN` (unknown/idle-expired), `TOKEN_REUSE_DETECTED`
            (revoked token replayed — all sessions wiped), `SESSION_EXPIRED` (absolute
            cap reached — full re-login required), `ACCOUNT_SUSPENDED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout — revoke current session
      description: |
        Revokes the current session's refresh token **and blacklists that session**, so the
        in-flight access token is rejected by the gateway immediately (not after its 15-min TTL).
        Idempotent — safe to call multiple times.

        **Mobile** — send refresh token via `Authorization: Bearer` with `X-Client-Type: mobile`.
        **Web** — reads from the `refresh_token` cookie; clears both auth cookies on response.
      security: []
      responses:
        '204': { description: Session revoked }

  /auth/logout-all:
    post:
      tags: [Auth]
      summary: Logout all sessions
      description: |
        Revokes all refresh tokens for the authenticated user across all devices, and
        blacklists the user so every in-flight access token is rejected immediately.
        Requires a valid access token (not a refresh token).
      responses:
        '204': { description: All sessions revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/sessions:
    get:
      tags: [Auth]
      summary: List active sessions
      description: |
        Returns all active refresh-token sessions for the authenticated user —
        i.e. all devices/browsers that currently have a valid refresh token.

        The `is_current` flag is `true` for the session that corresponds to the
        access token used to make this request (matched by `session_id` in the JWT).
        Use this to highlight the caller's own session in the UI.

        Use `DELETE /auth/sessions/{id}` to terminate any individual session.
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Session' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/sessions/{id}:
    delete:
      tags: [Auth]
      summary: Revoke a session
      description: |
        Revokes the refresh token for the given session, effectively logging out
        that device or browser. The next time the client calls `/auth/refresh`,
        it receives `401` and the user is forced to log in again.

        Rules:
        - You can only revoke your own sessions — any other `id` returns `404 SESSION_NOT_FOUND`.
        - You may revoke your current session (`is_current: true`) — the access token
          remains valid until it naturally expires (15 min TTL).
        - Revoking an already-revoked session returns `409 SESSION_ALREADY_REVOKED`.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: Session ID from `GET /auth/sessions`.
      responses:
        '204': { description: Session revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: '`SESSION_NOT_FOUND` — no session with this ID belonging to the caller.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: '`SESSION_ALREADY_REVOKED` — the session was already revoked.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend OTP (all purposes)
      description: |
        Central endpoint for resending any OTP. Supports all OTP flows via the required `purpose` field.

        **Purposes and when to use them:**

        | purpose | flow | channel |
        |---|---|---|
        | `phone_verification` | Registration — user never verified their phone | always `phone` |
        | `email_verification` | Registration — user never verified their email | always `email` |
        | `2fa` | Mid-login — 2FA code not received | user's `login_channel` (channel field ignored) |
        | `password_reset` | Mid-reset — reset code not received | `phone` or `email` |
        | `login_channel_change` | Mid-channel-switch — OTP not received | `phone` or `email` (target channel) |

        **Rules:**
        - The previous unused OTP for the same user+purpose is invalidated and replaced.
        - For `phone_verification` / `email_verification`: user must be in `pending_verification` status. Returns `CHANNEL_ALREADY_VERIFIED` (409) if the channel is already verified.
        - For `2fa`, `password_reset`, `login_channel_change`: an existing unused OTP must exist (proof the flow was initiated). This includes expired-but-unused OTPs — users who miss the window can resend without restarting the flow. Returns `OTP_FLOW_NOT_INITIATED` (400) if no prior OTP exists.
        - Rate-limited to 3 requests per 10 minutes per `user_id`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, purpose]
              properties:
                user_id:
                  type: string
                  format: uuid
                purpose:
                  type: string
                  enum: [phone_verification, email_verification, '2fa', password_reset, login_channel_change]
                  description: The OTP flow to resend for.
                channel:
                  type: string
                  enum: [phone, email]
                  default: phone
                  description: Delivery channel. Relevant for `password_reset` and `login_channel_change`. Ignored for `2fa` (always uses `login_channel`). Fixed for `phone_verification` (phone) and `email_verification` (email).
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_in: { type: integer, description: OTP TTL in seconds }
        '400':
          description: |
            `OTP_FLOW_NOT_INITIATED` — no prior OTP exists for this purpose (flow was never started).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: User not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: |
            One of:
            - `ALREADY_VERIFIED` — user is not in `pending_verification` status (phone/email_verification only)
            - `CHANNEL_ALREADY_VERIFIED` — the target channel is already verified
            - `TWO_FACTOR_NOT_ENABLED` — 2FA is not enabled on the account
            - `ALREADY_ACTIVE_CHANNEL` — target channel is already the active login channel
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/register-device:
    post:
      tags: [Auth]
      summary: Register FCM push token
      description: |
        Stores the Firebase Cloud Messaging (FCM) token for the authenticated user's device
        and switches `notif_channel` to `["app"]`. Uses upsert semantics — re-calling with
        the same token is safe (e.g. after a Firebase token refresh or app reinstall).

        After this call, security events (new device login, password change, account suspension)
        and org lifecycle events are delivered as push notifications to this device.

        The registered device appears in `GET /users/me/devices` with the token masked.
        To remove the device and revert `notif_channel`, call `DELETE /auth/register-device`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fcm_token]
              properties:
                fcm_token:
                  type: string
                  maxLength: 500
                  description: FCM registration token from the Firebase SDK.
                device_name:
                  type: string
                  maxLength: 200
                  description: 'Optional friendly name (e.g. "iPhone 15 Pro"). Shown in `GET /users/me/devices`.'
      responses:
        '204': { description: FCM token saved — notif_channel switched to app }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

    delete:
      tags: [Auth]
      summary: Unregister FCM push token
      description: |
        Removes the FCM token associated with the authenticated user's device and
        reverts `notif_channel` to the default for their account type:
        - Staff: `["sms", "email"]`
        - Passenger: `["sms"]`

        Returns `404 DEVICE_NOT_REGISTERED` if no FCM token is currently registered.
      responses:
        '204': { description: Device unregistered — notif_channel reverted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: '`DEVICE_NOT_REGISTERED` — no FCM token registered for this user.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  ORGANIZATIONS                                                           ║
  # ║  Create and understand organizations before inviting users into them.    ║
  # ║  Order: public list → create → list/read → update →                     ║
  # ║         cooperative-approve/reject → logo uploads                       ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  /organizations/public:
    get:
      tags: [Organizations]
      summary: List active organizations (public, no auth)
      description: |
        Returns a paginated list of `active` organizations for unauthenticated callers
        (e.g. passenger app trip-search filter, public directory).

        **No authentication required.**

        Only `active` orgs are returned. Sensitive fields (`tin`, `contact_phone`,
        `contact_email`, `contact_first_name`, `contact_last_name`, `address`,
        `license_number`, `approved_at`, `child_orgs`) are never included.

        Responses are publicly cacheable for 60 seconds (`Cache-Control: public, max-age=60`).
      security: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 12, minimum: 1, maximum: 100 }
        - in: query
          name: q
          schema: { type: string, maxLength: 200 }
          description: Case-insensitive substring match on org name.
      responses:
        '200':
          description: Paginated public org list
          headers:
            Cache-Control:
              schema: { type: string, example: 'public, max-age=60' }
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/OrgPublicListItem' }
                  total: { type: integer }
                  page:  { type: integer }
                  limit: { type: integer }

  /organizations:
    post:
      tags: [Organizations]
      summary: Create an organization (admin)
      description: |
        Creates an organization directly. Use this for orgs provisioned by Katisha staff
        on behalf of a client. For the self-service public flow, see `POST /organizations/apply`.

        **Required permission:** `create:Org`
        → `platform-admin`

        The org name is slugified automatically. Duplicate names return `409`.

        The optional `status` field lets the admin set an initial status other than `pending`
        (e.g. create an org already in `active` state without going through the review flow).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, org_type, contact_first_name, contact_last_name, contact_email, contact_phone, tin]
              properties:
                name:                 { type: string, maxLength: 200 }
                org_type:             { type: string, enum: [company, cooperative, coop_member] }
                contact_first_name:   { type: string, maxLength: 100, example: Jane }
                contact_last_name:    { type: string, maxLength: 100, example: Doe }
                contact_email:        { type: string, format: email, maxLength: 255 }
                contact_phone:        { type: string, pattern: '^\+\d{7,15}$', description: 'E.164 format (e.g. +250788000001).' }
                address:              { type: string, maxLength: 500 }
                tin:                  { type: string, pattern: '^\d{9}$', minLength: 9, maxLength: 9, description: 'Exactly 9 digits. Required and unique across all orgs.' }
                license_number:       { type: string, maxLength: 100 }
                parent_org_id:        { type: string, format: uuid, description: 'Required when org_type is coop_member. Must point to an active cooperative.' }
                story:                { type: string, maxLength: 5000, description: Free-form description of the organization. }
                status:               { type: string, enum: [active, pending, suspended], description: 'Initial status. Defaults to `pending` if omitted.' }
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgCreated' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: |
            Organization name already exists (`ORG_ALREADY_EXISTS`), or the contact
            phone (`CONTACT_PHONE_ALREADY_REGISTERED`) or email (`CONTACT_EMAIL_ALREADY_REGISTERED`)
            is already registered to a user account.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

    get:
      tags: [Organizations]
      summary: List organizations
      description: |
        **Required permission:** `read:Org`

        Platform admins see all orgs. `org-admin` and `dispatcher` see only their own org.
        Cooperative `org-admin` users with `approve:Org` permission also see their own org plus all
        `coop_member` orgs that have `parent_org_id` matching their org.
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 12, minimum: 1, maximum: 100 }
        - in: query
          name: status
          schema: { type: string, enum: [unverified, pending, active, suspended, rejected] }
        - in: query
          name: org_type
          schema: { type: string, enum: [company, cooperative, coop_member] }
        - in: query
          name: q
          schema: { type: string, maxLength: 200 }
          description: Full-text search across org name, contact name, email, and phone (case-insensitive substring match).
      responses:
        '200':
          description: Paginated org list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/OrgListItem' }
                  total: { type: integer, description: Total records matching the filters. }
                  page:  { type: integer }
                  limit: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /organizations/me:
    get:
      tags: [Organizations]
      summary: Get own organization
      description: |
        Returns the organization the authenticated user belongs to (`org_id` from their JWT).
        No permission gate — any authenticated user with an `org_id` may call this.
        Returns `404` for users with no org (passengers, platform admins).
      responses:
        '200':
          description: Own organization
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgFull' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: User has no associated organization
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ORG_NOT_FOUND } }

  /organizations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Organizations]
      summary: Get organization by ID
      description: |
        **Required permission:** `read:Org`

        Non-admin callers may only read their own org (`403` otherwise) — **except**
        cooperative admins (those holding `approve:Org`), who may also read their own
        `coop_member`s (orgs whose `parent_org_id` equals the caller's `org_id`). This is
        what lets a cooperative load a member's review page. Platform-scope readers can
        read any org.
      responses:
        '200':
          description: Organization detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgFull' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      tags: [Organizations]
      summary: Update organization
      description: |
        **Required permission:** `update:Org`

        Field-level rules:
        - `status`, `rejection_reason`, and `parent_org_id` — platform admins only. `org-admin` callers receive `403` if these fields are included.
        - `logo_path` — use `path` from the logo presigned-url endpoint. Pass `null` to remove (S3 file deleted asynchronously).
        - `story` — free-form text description of the org. Pass `null` to clear.
        - `parent_org_id` — reassigns the org to a different parent cooperative (admin only). `null` removes the parent. The target **must be a `cooperative`** (`400 PARENT_NOT_COOPERATIVE`, or `404 PARENT_ORG_NOT_FOUND`); an org cannot parent itself (`400 ORG_CANNOT_PARENT_ITSELF`); a `coop_member` cannot drop its parent (`400 COOP_MEMBER_REQUIRES_PARENT`). Fires an `org.updated` domain event when changed.
        - `status: rejected` — requires `rejection_reason` (`400 REJECTION_REASON_REQUIRED`).
        - `status: suspended` — blacklists all active access tokens for this org's users in Redis (15 min TTL). Sends `org.suspended` notifications directly to the org contact and fans out to all active org users via their `notif_channel` preference.
        - `status: rejected` — sends `org.rejected` notifications to the org contact.
        - `status: active` — final approval by platform admins. For `coop_member` orgs, the parent
          cooperative must have pre-approved first (`cooperative_approved_at` must be set) — attempting
          activation without it returns `400 COOPERATIVE_APPROVAL_REQUIRED`. On activation, creates an
          `Invitation` for the org contact and sends the invite link (`<APP_URL>/i?t=<token>`,
          7-day expiry). Notification type varies by org_type: `company`/`cooperative` receive
          `org_approved.sms`/`org_approved.mail`; `coop_member` receives `org.member_approved`
          (with invite link) and the parent cooperative's admins are notified via `org.member_approved_notify_coop`.

        **Domain events** published to `logs` exchange → `org.events` routing key:
        - `org.activated` — when `status` set to `active` (includes `name`, `slug`, `org_type`, `logo_path`, `parent_org_id`, `story`, `cancellations_allowed`)
        - `org.updated` — when `name`, `logo_path`, `parent_org_id`, `story`, or `cancellations_allowed` changes
        - `org.suspended` — when `status` set to `suspended`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:                 { type: string, maxLength: 200 }
                contact_first_name:   { type: string, maxLength: 100, example: Jane }
                contact_last_name:    { type: string, maxLength: 100, example: Doe }
                contact_email:        { type: string, format: email, maxLength: 255 }
                contact_phone:        { type: string, pattern: '^\+\d{7,15}$', description: 'E.164 format (e.g. +250788000001).' }
                address:              { type: string, maxLength: 500 }
                logo_path:            { type: string, maxLength: 500, nullable: true, description: 'S3 path from logo presigned-url. null removes the logo.' }
                story:                { type: string, maxLength: 5000, nullable: true, description: 'Free-form description of the org. null clears it. Fires org.updated domain event when changed.' }
                cancellations_allowed: { type: boolean, description: 'Whether this org permits passengers to cancel tickets. Settable by org-admin or platform admin. Fires org.updated domain event when changed.' }
                parent_org_id:        { type: string, format: uuid, nullable: true, description: 'Admin only. Reassigns the org to a different parent cooperative. null removes the parent. Fires org.updated domain event when changed.' }
                status:
                  type: string
                  enum: [active, suspended, rejected]
                  description: Admin only. suspended triggers token blacklist and notifications.
                rejection_reason:     { type: string, maxLength: 1000, description: Admin only. Include when setting status to rejected. }
                bank_id:              { type: string, format: uuid, nullable: true, description: 'UUID of the bank from GET /banks. null clears the bank selection.' }
                account_number:       { type: string, pattern: '^\d{8,20}$', description: '8–20 digit bank account number. Digits only — no dashes or spaces.' }
      responses:
        '200':
          description: Updated organization
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgFull' }
        '400':
          description: |
            Business-rule violation. `code` is one of:
            `COOPERATIVE_APPROVAL_REQUIRED` (activating a `coop_member` before the
            cooperative pre-approved), `REJECTION_REASON_REQUIRED`, `PARENT_NOT_COOPERATIVE`,
            `COOP_MEMBER_REQUIRES_PARENT`, `ORG_CANNOT_PARENT_ITSELF`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            Conflict on a changed identity field. `code` is one of:
            `ORG_ALREADY_EXISTS` (name/slug), `CONTACT_PHONE_ALREADY_REGISTERED`,
            `CONTACT_EMAIL_ALREADY_REGISTERED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /organizations/{id}/documents:
    get:
      tags: [Organizations]
      summary: Get an org's application documents
      description: |
        **Required permission:** `read:Org` (object-scoped like `GET /organizations/{id}`:
        own org, platform, or a cooperative admin reading their own `coop_member`).

        Returns short-lived **presigned GET URLs** for the org's application documents
        (business certificate, representative ID). Documents live in a private bucket and
        are never publicly readable — each `url` is signed and expires.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Document links.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [id, doc_type, mime_type, created_at, url]
                      properties:
                        id:         { type: string, format: uuid }
                        doc_type:   { type: string, enum: [business_certificate, rep_id], example: business_certificate }
                        mime_type:  { type: string, example: application/pdf }
                        created_at: { type: string, format: date-time }
                        url:
                          type: string
                          format: uri
                          description: Short-lived presigned GET URL (expires).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/{id}/cooperative-approve:
    post:
      tags: [Organizations]
      summary: Cooperative pre-approval of a coop_member org
      description: |
        **Required permission:** `approve:Org`
        → `org-admin` of the parent cooperative in practice.

        Pre-approves a `coop_member` org application before it reaches Katisha admins for final review.

        - The caller's `org_id` must match the target org's `parent_org_id`, otherwise `403`.
        - The target org must be of type `coop_member` and in `pending` status.
        - Sets `cooperative_approved_at` and `cooperative_approved_by` on the org record. Status remains `pending`.
        - Notifies platform notification recipients (`Notification:receive:platform`) that the member
          application has been pre-approved and is ready for final Katisha review.
        - Sends `org.member_coop_approved` SMS + email to the coop_member org's contact.

        After this step, a Katisha admin must use `PATCH /organizations/:id` with `status: active`
        to complete the final approval.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pre-approved. `cooperative_approved_at` is set; status remains `pending`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrgFull' }
        '400':
          description: |
            Org is not in `pending` status (`ORG_NOT_PENDING`) or
            org type is not `coop_member` (`ORG_NOT_COOP_MEMBER`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/{id}/cooperative-reject:
    post:
      tags: [Organizations]
      summary: Cooperative rejection of a coop_member org
      description: |
        **Required permission:** `approve:Org`
        → `org-admin` of the parent cooperative in practice.

        Rejects a `coop_member` org application on behalf of the parent cooperative.

        - The caller's `org_id` must match the target org's `parent_org_id`, otherwise `403`.
        - The target org must be of type `coop_member` and in `pending` status.
        - Sets the org status to `rejected`.
        - Sends `org.member_coop_rejected` SMS + email to the coop_member org's contact (includes
          optional `reason`).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 1000, description: 'Optional rejection reason shown to the applicant.' }
      responses:
        '204':
          description: Rejected. No response body.
        '400':
          description: |
            Org is not in `pending` status (`ORG_NOT_PENDING`) or
            org type is not `coop_member` (`ORG_NOT_COOP_MEMBER`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /organizations/me/logo/presigned-url:
    get:
      tags: [Organizations]
      summary: Get presigned PUT URL for own org's logo
      description: |
        Returns a short-lived S3 presigned URL for uploading the organization logo directly to SeaweedFS.
        Intended for `org-admin` users to manage their own org's logo.

        **Required permission:** `update:Org`

        **Upload flow:**
        1. Call with `?content_type=image/png`.
        2. `PUT` the image to `upload_url` with the matching `Content-Type` header.
        3. `PATCH /organizations/:id` with `{ "logo_path": "<path>" }` to persist.

        To **remove** the logo: `PATCH /organizations/:id` with `{ "logo_path": null }`.
        Build the CDN URL client-side: `CDN_BASE_URL + "/" + logo_path`.
      parameters:
        - in: query
          name: content_type
          required: true
          schema:
            type: string
            enum: [image/jpeg, image/png, image/webp, image/gif]
      responses:
        '200':
          description: Presigned URL ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url: { type: string, format: uri, description: 'PUT the image here. Expires in ~5 min.' }
                  path:       { type: string, example: 'logos/org-id/uuid.png', description: 'Send as logo_path in PATCH /organizations/:id.' }
        '400':
          description: |
            Missing `content_type` query parameter (`MISSING_CONTENT_TYPE`), or the authenticated
            user has no `org_id` (`NO_ORG` — should not occur for a valid `org-admin`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415':
          description: Unsupported content type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: UNSUPPORTED_MEDIA_TYPE } }

  /organizations/{id}/logo/presigned-url:
    get:
      tags: [Organizations]
      summary: Get presigned PUT URL for any org's logo (admin)
      description: |
        Same upload flow as `GET /organizations/me/logo/presigned-url` but targets a specific
        org by ID. Intended for platform admins to manage logos for any org.

        **Required permission:** `update:Org` — **object-scoped**: the caller must be allowed
        to update *that* org (platform admins: any org; org-admins: only their own). A caller
        who only holds org-scope `update:Org` gets `403` for an org other than their own.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: content_type
          required: true
          schema:
            type: string
            enum: [image/jpeg, image/png, image/webp, image/gif]
      responses:
        '200':
          description: Presigned URL ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url: { type: string, format: uri, description: 'PUT the image here. Expires in ~5 min.' }
                  path:       { type: string, example: 'logos/org-id/uuid.png', description: 'Send as logo_path in PATCH /organizations/:id.' }
        '400':
          description: Missing content_type query parameter
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '415':
          description: Unsupported content type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: UNSUPPORTED_MEDIA_TYPE } }

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  ORGANIZATION APPLICATIONS                                               ║
  # ║  Public 4-step flow. No auth required.                                  ║
  # ║  Order: upload docs → submit → verify contact (phone or email) →        ║
  # ║         (optional) resend OTP                                            ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  /organizations/apply/documents/presigned-url:
    get:
      tags: [Organization Applications]
      summary: 'Step 1 — Get presigned PUT URL for an application document'
      description: |
        Returns a short-lived S3 presigned URL for uploading org application documents
        directly to SeaweedFS. **No authentication required.**

        Call this endpoint **twice** before submitting an application — once per document type.
        Collect both returned `path` values and pass them to `POST /organizations/apply`.

        Accepted content types per document type:

        | `doc_type` | Accepted `content_type` |
        |---|---|
        | `business_certificate` | `application/pdf` only |
        | `rep_id` | `application/pdf`, `image/jpeg`, `image/png`, `image/webp` |

        The presigned URL expires in ~5 min. Upload must complete before expiry.
      security: []
      parameters:
        - in: query
          name: doc_type
          required: true
          schema:
            type: string
            enum: [business_certificate, rep_id]
          description: Type of document being uploaded.
        - in: query
          name: content_type
          required: true
          schema:
            type: string
            enum: [application/pdf, image/jpeg, image/png, image/webp]
          description: MIME type of the file. Must exactly match the Content-Type header used in the PUT request.
      responses:
        '200':
          description: Presigned URL ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url:
                    type: string
                    format: uri
                    description: 'PUT the document here with the matching Content-Type header. Expires in ~5 min.'
                  path:
                    type: string
                    example: 'org-docs/pending/business_certificate/uuid.pdf'
                    description: 'Pass as business_certificate_path or rep_id_path in POST /organizations/apply.'
        '400':
          description: Missing or invalid query parameters
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '415':
          description: Content type not allowed for the given document type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: UNSUPPORTED_MEDIA_TYPE } }

  /organizations/apply:
    post:
      tags: [Organization Applications]
      summary: 'Step 2 — Submit an organization application'
      description: |
        Public endpoint — no authentication required.

        Creates an org record in `unverified` status with the uploaded document paths and sends
        **separate** 6-digit OTPs to both channels:
        - **Phone OTP** — always sent via SMS to `contact_phone`
        - **Email OTP** — sent via email to `contact_email`

        Both OTPs are independent (different codes). The applicant only needs to verify **one**
        channel via `POST /organizations/verify-contact` to advance the org to `pending` status.

        **Prerequisites:** upload both documents using `GET /organizations/apply/documents/presigned-url`
        and supply the returned `path` values as `business_certificate_path` and `rep_id_path`.

        No admin review is triggered until `POST /organizations/verify-contact` succeeds.
        Unverified orgs are automatically purged by a cleanup job after a grace period.
        If a duplicate-name conflict arises after purge, the applicant should contact support.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, org_type, contact_first_name, contact_last_name, contact_email, contact_phone, tin, business_certificate_path, rep_id_path]
              properties:
                name:                 { type: string, maxLength: 200 }
                org_type:
                  type: string
                  enum: [company, cooperative, coop_member]
                  description: |
                    Type of organization. `coop_member` represents an individual driver-owner or
                    fleet manager operating under a cooperative. `parent_org_id` is required when
                    `org_type` is `coop_member`.
                contact_first_name:   { type: string, maxLength: 100, example: Jane, description: 'Contact representative first name.' }
                contact_last_name:    { type: string, maxLength: 100, example: Doe, description: 'Contact representative last name.' }
                contact_email:        { type: string, format: email, maxLength: 255, description: 'Required. A 6-digit OTP is sent here.' }
                contact_phone:        { type: string, pattern: '^\+\d{7,15}$', description: 'Required. E.164 format. A separate 6-digit OTP is sent here via SMS.' }
                address:              { type: string, maxLength: 500 }
                tin:                  { type: string, pattern: '^\d{9}$', minLength: 9, maxLength: 9, description: 'Exactly 9 digits. Required and unique across all orgs.' }
                license_number:       { type: string, maxLength: 100 }
                parent_org_id:
                  type: string
                  format: uuid
                  description: |
                    **Required when `org_type` is `coop_member`.** Must be the UUID of an active
                    `cooperative` org. The coop_member will appear in that cooperative's pending
                    member list for pre-approval before reaching Katisha admins.
                business_certificate_path:
                  type: string
                  maxLength: 500
                  description: S3 path from GET /organizations/apply/documents/presigned-url with doc_type=business_certificate.
                rep_id_path:
                  type: string
                  maxLength: 500
                  description: S3 path from GET /organizations/apply/documents/presigned-url with doc_type=rep_id.
                story:
                  type: string
                  maxLength: 5000
                  description: Free-form description of the organization — background, services, why they are applying.
      responses:
        '202':
          description: Application received — OTPs sent to contact_phone (SMS) and contact_email
          content:
            application/json:
              schema:
                type: object
                properties:
                  org_id:
                    type: string
                    format: uuid
                    description: 'Pass to POST /organizations/verify-contact along with the OTP and channel.'
                  message:
                    type: string
                    example: 'Application received. Verification codes have been sent to your phone and email.'
        '409':
          description: |
            Organization name or slug already registered (`ORG_ALREADY_EXISTS`), or the contact
            phone (`CONTACT_PHONE_ALREADY_REGISTERED`) or email (`CONTACT_EMAIL_ALREADY_REGISTERED`)
            is already registered to a user account. These are checked upfront so the applicant
            does not discover the conflict only when accepting the invitation later.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /organizations/verify-contact:
    post:
      tags: [Organization Applications]
      summary: 'Step 3 — Verify org contact (phone or email) with OTP'
      description: |
        Public endpoint — no authentication required.

        Verifies the 6-digit OTP sent to the chosen `channel` during `POST /organizations/apply`.
        Either channel (`phone` or `email`) is sufficient — verifying one is enough to advance.

        On success:
        - Sets `contact_phone_verified_at` or `contact_email_verified_at` on the org record.
        - Promotes the org from `unverified` → `pending` status.
        - Sends a confirmation SMS + email to the applicant.
        - Notifies platform notification recipients (users with `Notification:receive:platform`
          permission) via their preferred channels (`notif_channel`) to trigger manual review.
        - For `coop_member` orgs, also notifies the parent cooperative's admins (users with
          `Notification:receive:org` permission in that cooperative) that a member application
          is awaiting their pre-approval.

        **Next steps by org_type:**
        - `company` / `cooperative`: Katisha admins finalize via `PATCH /organizations/:id`
          (`status: active` or `status: rejected`).
        - `coop_member`: cooperative admins pre-approve via `POST /organizations/:id/cooperative-approve`
          (or reject via `POST /organizations/:id/cooperative-reject`), then Katisha admins
          finalize via `PATCH /organizations/:id` with `status: active`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, otp, channel]
              properties:
                org_id:
                  type: string
                  format: uuid
                  description: The org ID returned by POST /organizations/apply.
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: 6-digit code received on the selected channel.
                channel:
                  type: string
                  enum: [phone, email]
                  description: 'The channel the OTP was received on. Must match the OTP sent to that channel.'
      responses:
        '204': { description: Contact verified — org promoted to pending, admins notified }
        '400':
          description: Invalid OTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: INVALID_OTP } }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: |
            One of:
            - `CONTACT_ALREADY_VERIFIED` — the specified channel is already verified, or the org is no longer in `unverified` status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: CONTACT_ALREADY_VERIFIED } }
        '410':
          description: OTP expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: OTP_EXPIRED } }

  /organizations/apply/resend-contact-otp:
    post:
      tags: [Organization Applications]
      summary: 'Step 3 (optional) — Resend contact OTP'
      description: |
        Public endpoint — no authentication required.

        Resends the OTP for the chosen `channel` (`phone` or `email`). Creates a new OTP
        (invalidating the previous unused one) and re-sends it via SMS or email.

        **Prerequisites:** the OTP flow must have been initiated — i.e. the org was created via
        `POST /organizations/apply`. Returns `OTP_FLOW_NOT_INITIATED` (400) if no prior OTP
        record exists for the given org and channel.

        Returns `CONTACT_ALREADY_VERIFIED` (409) if the org is no longer in `unverified` status
        (either already verified or approved/rejected).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_id, channel]
              properties:
                org_id:
                  type: string
                  format: uuid
                  description: The org ID returned by POST /organizations/apply.
                channel:
                  type: string
                  enum: [phone, email]
                  description: The channel to resend the OTP to.
      responses:
        '200':
          description: OTP resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_in:
                    type: integer
                    description: OTP TTL in seconds.
                    example: 300
        '400':
          description: '`OTP_FLOW_NOT_INITIATED` — no prior OTP exists for this org and channel.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: OTP_FLOW_NOT_INITIATED } }
        '404':
          description: Organization not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ORG_NOT_FOUND } }
        '409':
          description: '`CONTACT_ALREADY_VERIFIED` — org is no longer in `unverified` status.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: CONTACT_ALREADY_VERIFIED } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  USERS                                                                   ║
  # ║  Manage your own profile first, then invite and administer others.       ║
  # ║  Order: own profile → avatar → security settings → invite → accept →    ║
  # ║         list all → get/update/delete by ID                               ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  /users/me:
    get:
      tags: [Users]
      summary: Get own profile
      description: |
        Returns the authenticated user's profile. Response shape differs by `user_type`:
        - `passenger` → `UserMePassenger`
        - `staff` → `UserMeStaff` (includes role slugs and packed CASL permission rules)
      responses:
        '200':
          description: Own profile
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UserMePassenger'
                  - $ref: '#/components/schemas/UserMeStaff'
                discriminator:
                  propertyName: user_type
        '401': { $ref: '#/components/responses/Unauthorized' }

    patch:
      tags: [Users]
      summary: Update own profile / change password
      description: |
        Updates the authenticated user's own profile. At least one field must be provided.

        **Password change mode** — send `{ "password": "newPassword" }` (only):
        Requires `x-sudo-token` header with action `change_password` (obtain from
        `POST /users/me/validate-password`).

        Follows the "sign out everywhere **except this device**" pattern: all existing
        sessions are revoked (other devices are logged out immediately), and a **fresh
        token pair is issued for the current device** so the caller stays logged in.
        Delivery mirrors login:
        - **Web** — new `access_token` / `refresh_token` `HttpOnly` cookies are set; responds `204`.
        - **Mobile** (`X-Client-Type: mobile`) — responds `200` with the new tokens in the body;
          the client **must replace its stored tokens** with these.

        A `security.password_changed` notification is sent via all configured channels.

        **Profile update mode** — any other field combination (no `password`):
        No sudo token needed.

        Field notes (profile update):
        - `phone_number` — if phone is the current `login_channel`, the update is rejected with
          `LOGIN_CHANNEL_CHANGE_REQUIRED` (422) — use `POST /users/me/login-channel` instead.
        - `email` — if email is the current `login_channel`, the update is rejected with
          `LOGIN_CHANNEL_CHANGE_REQUIRED` (422) — use `POST /users/me/login-channel` instead.
        - `avatar_path` — use the `path` from `GET /users/me/avatar/presigned-url` after uploading.
          Pass `null` to remove the current avatar (S3 file is deleted asynchronously).
        - `notif_channel` — array of one or more delivery channels. Setting `app` without a
          registered FCM token will leave push non-functional until `POST /auth/register-device`.
        - `two_factor_enabled` — toggles 2FA. On change, a `security.2fa_enabled` or
          `security.2fa_disabled` notification is sent via the user's `notif_channel`.
        - `locale` — sets the preferred language for all future notifications.
      parameters:
        - $ref: '#/components/parameters/SudoToken'
          required: false
          description: Required only when `password` is present in the body (action `change_password`).
        - $ref: '#/components/parameters/ClientType'
        - $ref: '#/components/parameters/Locale'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                first_name:   { type: string, maxLength: 100 }
                last_name:    { type: string, maxLength: 100 }
                phone_number:
                  type: string
                  pattern: '^\+\d{7,15}$'
                  description: |
                    E.164 format. Cannot be changed if phone is the current `login_channel` — use
                    `POST /users/me/login-channel` with an `identifier` instead.
                email:
                  type: string
                  format: email
                  maxLength: 255
                  description: |
                    Cannot be changed if email is the current `login_channel` — use
                    `POST /users/me/login-channel` with an `identifier` instead.
                avatar_path:
                  type: string
                  maxLength: 500
                  nullable: true
                  description: S3 path from the presigned-url endpoint. null removes the avatar.
                notif_channel:
                  type: array
                  items: { type: string, enum: [sms, email, app] }
                  minItems: 1
                  uniqueItems: true
                  description: Notification delivery channels. At least one required.
                  example: [sms, email]
                locale:
                  type: string
                  enum: [rw, en, fr]
                  description: Preferred notification language.
                two_factor_enabled:
                  type: boolean
                  description: Enable or disable 2FA. Triggers a security notification on change.
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: |
                    New password. When present, this is the only field processed — all other
                    fields in the body are ignored. Requires `x-sudo-token` header with
                    action `change_password`.
            examples:
              update_profile:
                summary: Update display name and locale
                value: { first_name: Alice, locale: en }
              change_password:
                summary: Change password (requires x-sudo-token)
                value: { password: 'MyNewSecurePass1!' }
      responses:
        '200':
          description: |
            Either: a profile update (returns the updated user object), or a password change
            from a **mobile** client (returns the fresh token pair — store these).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UserMePassenger'
                  - $ref: '#/components/schemas/UserMeStaff'
                  - $ref: '#/components/schemas/Tokens'
        '204': { description: 'Password changed (web) — other sessions revoked; fresh `access_token`/`refresh_token` cookies set on this device.' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/StepUpRequired' }
        '409':
          description: '`LOGIN_CHANNEL_CHANGE_REQUIRED` — cannot update email/phone directly while it is the active login channel.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

    delete:
      tags: [Users]
      summary: Delete own account
      description: |
        Soft-deletes the authenticated user's own account. Requires a sudo token
        with action `delete_account` obtained from `POST /users/me/validate-password`.

        **Effects:**
        - Account status set to `pending_deletion`, `deleted_at` timestamped.
        - All active refresh tokens revoked immediately — all sessions terminated.
        - Access tokens blacklisted for their remaining TTL (~15 min) so in-flight
          requests are rejected.
        - If the user is `staff`, a `staff.deleted` domain event is published to
          the `users` exchange for downstream services.
        - An audit entry is written.

        > **Note:** Deletion is soft — the record is retained for compliance and audit
        > purposes. Contact platform support if you need hard deletion.
      parameters:
        - $ref: '#/components/parameters/SudoToken'
      responses:
        '204': { description: Account deleted — all sessions terminated }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/StepUpRequired' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/me/devices:
    get:
      tags: [Users]
      summary: List registered FCM devices
      description: |
        Returns all FCM-registered devices for the authenticated user, ordered by
        `registered_at` descending (newest first).

        Only FCM push-notification devices are tracked here. Browser sessions appear
        in `GET /auth/sessions` instead (refresh-token based, not FCM).

        The raw FCM token is never returned — only the last 6 characters are visible
        in `fcm_token_preview` (the rest is masked with `*`).

        Use `DELETE /auth/register-device` to remove the current device's FCM registration.
      responses:
        '200':
          description: Registered devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/UserDevice' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/me/avatar/presigned-url:
    get:
      tags: [Users]
      summary: Get presigned PUT URL for own avatar
      description: |
        Returns a short-lived S3 presigned URL for uploading an avatar image directly
        to SeaweedFS. The user-service never handles the file bytes.

        **Upload flow:**
        1. Call with `?content_type=image/jpeg` (or `png`/`webp`/`gif`).
        2. `PUT` the image to `upload_url` with the **exact same** `Content-Type` header.
        3. `PATCH /users/me` with `{ "avatar_path": "<path>" }` to persist.

        To **remove** the avatar: `PATCH /users/me` with `{ "avatar_path": null }`.
        Build the full CDN URL client-side: `CDN_BASE_URL + "/" + path`.
      parameters:
        - in: query
          name: content_type
          required: true
          schema:
            type: string
            enum: [image/jpeg, image/png, image/webp, image/gif]
      responses:
        '200':
          description: Presigned URL ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_url:
                    type: string
                    format: uri
                    description: 'PUT the image file here. Expires in ~5 min.'
                  path:
                    type: string
                    example: 'avatars/user-id/uuid.jpg'
                    description: 'Use this as avatar_path in PATCH /users/me.'
        '400':
          description: Missing content_type query parameter
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '415':
          description: Unsupported content type
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: UNSUPPORTED_MEDIA_TYPE } }

  /users/me/validate-password:
    post:
      tags: [Users]
      summary: Issue sudo token (step-up authentication)
      description: |
        Verifies the authenticated user's current password and issues a short-lived,
        **action-scoped sudo token** valid for exactly **3 minutes**.

        The token must be included as `x-sudo-token` in subsequent requests to
        sudo-protected endpoints. Each token is **single-use** — it is consumed on
        first use. Obtain a new token for each sensitive action.

        **Sudo-protected endpoints and their required `action` value:**

        | Endpoint | `action` | Applies to |
        |---|---|---|
        | `PATCH /users/me` with `password` | `change_password` | any user |
        | `DELETE /users/me` | `delete_account` | any user |
        | `POST /tickets` (Trip Service) | `purchase_ticket` | **passengers paying by wallet only** — staff are exempt |

        **Rate limiting:** 3 failed password attempts within a 15-minute window triggers
        a lockout. The lockout resets on a successful verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, action]
              properties:
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
                  description: The user's current plaintext password.
                action:
                  type: string
                  enum: [change_password, delete_account, purchase_ticket]
                  description: The specific action this token will authorise.
            examples:
              change_password:
                summary: Obtain token before changing password
                value: { password: 'MyCurrentPass1!', action: change_password }
              delete_account:
                summary: Obtain token before deleting account
                value: { password: 'MyCurrentPass1!', action: delete_account }
              purchase_ticket:
                summary: Obtain token before purchasing a ticket
                value: { password: 'MyCurrentPass1!', action: purchase_ticket }
      responses:
        '200':
          description: Password verified — sudo token issued
          content:
            application/json:
              schema:
                type: object
                required: [sudoToken, expiresAt, expiresIn]
                properties:
                  sudoToken:
                    type: string
                    description: Signed EdDSA JWT. Include as `x-sudo-token` header on the protected request.
                  expiresAt:
                    type: string
                    format: date-time
                    description: ISO 8601 expiry — exactly 3 minutes from issuance.
                  expiresIn:
                    type: integer
                    enum: [180]
                    description: Always 180 seconds.
              example:
                sudoToken: eyJhbGciOiJFZERTQSJ9.eyJzdWIiOiJ1c2VyLTEiLCJ0eXBlIjoic3VkbyIsImFjdGlvbiI6ImNoYW5nZV9wYXNzd29yZCIsImp0aSI6ImFiYzEyMyIsImlhdCI6MTcwMDAwMDAwMCwiZXhwIjoxNzAwMDAwMTgwfQ.sig
                expiresAt: '2025-05-18T12:03:00.000Z'
                expiresIn: 180
        '401':
          description: Wrong password
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: INVALID_CREDENTIALS } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429':
          description: Too many failed attempts — 15-minute lockout active
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      error:
                        type: object
                        properties:
                          details:
                            type: object
                            properties:
                              retryAfter:
                                type: integer
                                description: Seconds until the lockout expires.
              example:
                error:
                  code: TOO_MANY_ATTEMPTS
                  details: { retryAfter: 743 }

  /users/me/login-channel:
    post:
      tags: [Users]
      summary: Request login channel / identifier change (step 1 — sends OTP)
      description: |
        Initiates a login channel change. Supports two modes:

        **Switch mode** — `channel` only, no `identifier`:
        Switches the active `login_channel` to the other channel (phone ↔ email).
        An OTP is sent to the target channel's existing identifier.
        If the channel was not yet verified, confirming the OTP also marks it as verified.

        **Change mode** — `channel` + `identifier`:
        Updates the actual phone number or email address **and** makes it the new `login_channel`.
        The new identifier must not already be in use by another account.
        An OTP is sent to the **new** identifier for verification.
        On confirm, the identifier is written to the user record and marked as verified.

        In both modes a pending change is stored server-side (TTL = OTP expiry).
        The pending change is consumed by `POST /users/me/login-channel/confirm`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel]
              properties:
                channel:
                  type: string
                  enum: [phone, email]
                  description: The channel type being switched to or the type of the new identifier.
                identifier:
                  type: string
                  description: |
                    **Change mode only.** The new phone number (E.164) or email address to verify
                    and adopt as the login channel. Omit for a simple channel-type switch.
                  example: '+250781234567'
            examples:
              switch_to_email:
                summary: Switch login channel to email (sends OTP; verifies if needed)
                value: { channel: email }
              change_phone:
                summary: Change phone number and switch to phone login
                value: { channel: phone, identifier: '+250781234567' }
      responses:
        '200':
          description: OTP sent — call `/confirm` with `channel` and the OTP code
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_in:
                    type: integer
                    description: OTP validity period in seconds (e.g. 300 = 5 minutes).
                  masked_identifier:
                    type: string
                    description: Redacted version of the address the OTP was sent to (e.g. `jo***@example.com` or `+250788***567`). Display this to the user so they know where to look.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: |
            `ALREADY_ACTIVE_CHANNEL` — channel is already the active login channel.
            `IDENTIFIER_UNCHANGED` — identifier matches the current value.
            `EMAIL_ALREADY_IN_USE` / `PHONE_ALREADY_IN_USE` — identifier taken by another account.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            `EMAIL_NOT_FOUND` — switching to email but no email on the account.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /users/me/login-channel/confirm:
    post:
      tags: [Users]
      summary: Confirm login channel / identifier change (step 2 — verifies OTP, applies change)
      description: |
        Confirms the pending login channel change initiated by `POST /users/me/login-channel`.

        The server reads the pending state (channel + identifier) from Redis — the client only
        needs to send `channel` and the OTP code. No need to re-send the identifier.

        **Switch mode** (channel type switch, no identifier update):
        Updates `login_channel` only. If the channel was previously unverified, `verified_at` is
        also stamped. The identifier fields (`phone_number`, `email`) are unchanged.

        **Change mode** (new identifier was provided in step 1):
        Updates the identifier field (`phone_number` or `email`), stamps `verified_at`, and sets
        `login_channel` — all in one atomic update.

        Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, otp]
              properties:
                channel: { type: string, enum: [phone, email] }
                otp:     { type: string, minLength: 6, maxLength: 6 }
      responses:
        '200':
          description: Login channel updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  login_channel: { type: string, enum: [phone, email] }
        '400':
          description: |
            `NO_PENDING_CHANNEL_CHANGE` — no pending change found (expired or never initiated).
            `CHANNEL_MISMATCH` — `channel` does not match the pending request.
            `INVALID_OTP` — wrong OTP code.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '410': { description: OTP expired, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  # ── Wallet ──────────────────────────────────────────────────────────────────

  /users/me/wallet:
    get:
      tags: [Wallet]
      summary: Get wallet balance
      description: |
        Returns the authenticated passenger's available wallet balance from the
        user-service's local projection. No synchronous call to the payment service is
        made — the balance is kept in sync via `payment` (`wallet.events`) RabbitMQ
        messages, which set the balance from each movement's authoritative `newBalance`.

        Reflects all completed top-ups, ticket purchases, and refunds.
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        '200':
          description: Current available balance.
          content:
            application/json:
              schema:
                type: object
                required: [available, currency]
                properties:
                  available:
                    type: number
                    example: 15000
                    description: Available wallet balance in RWF.
                  currency:
                    type: string
                    example: RWF
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: User record not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example:
                error: { code: USER_NOT_FOUND, message: User not found }

  /users/me/wallet/topup:
    post:
      tags: [Wallet]
      summary: Initiate a wallet top-up
      description: |
        Submits a wallet top-up request via mobile money. The request is accepted immediately
        and processed asynchronously by the payment service.

        Returns a `topup_id` that the client must use to open the SSE stream
        (`GET /users/me/wallet/topup/{topup_id}/stream`) to receive the payment result.

        **Note:** This endpoint is allowed even when an organisation's billing is overdue
        (`ORG_BILLING_OVERDUE`), because topping up is the action required to clear the balance.
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, payment_method]
              properties:
                amount:
                  type: integer
                  minimum: 100
                  maximum: 5000000
                  example: 5000
                  description: Amount to top up in RWF. Must be an integer between 100 and 5,000,000.
                phone:
                  type: string
                  example: '+250788000001'
                  description: |
                    Mobile money phone number that will be charged. Optional — if omitted,
                    the phone number on the user's profile is used. Accepts E.164 or local
                    Rwandan formats (normalised server-side). Note: the wallet credited is
                    always the **authenticated** user's; `phone` only determines who pays.
                payment_method:
                  type: string
                  enum: [mtn, airtel]
                  example: mtn
                  description: Mobile money provider.
      responses:
        '202':
          description: Top-up request accepted — await the result via the SSE stream.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TopupInitiated' }
              example:
                topup_id: d3f8a1b2-0000-0000-0000-000000000042
        '400':
          description: '`INVALID_AMOUNT` — amount is not an integer, below 100, or above 5,000,000.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example:
                error: { code: INVALID_AMOUNT, message: 'Minimum top up amount is RWF 100' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422':
          description: '`INVALID_PHONE` — the provided phone is invalid, or none was given and the profile has no phone.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example:
                error: { code: INVALID_PHONE, message: Invalid phone number }

  /users/me/wallet/topup/{topup_id}/stream:
    get:
      tags: [Wallet]
      summary: Stream top-up status (SSE)
      description: |
        Opens a **Server-Sent Events** (SSE) stream that delivers the payment result for
        a previously initiated top-up in real time.

        ## Connection

        Set the `Accept: text/event-stream` header (or use the browser `EventSource` API).
        The response uses `Content-Type: text/event-stream` with chunked transfer encoding.
        **Do not** go through a buffering proxy for this endpoint.

        ## Events

        Each event has a named `event` field (equal to the payload's `status`) and a JSON
        `data` field carrying that `status`:

        ```
        event: pending
        data: {"status":"pending"}

        event: confirmed
        data: {"status":"confirmed","amount":5000,"currency":"RWF","new_balance":15000,"message":"Your wallet has been topped up successfully."}

        event: failed
        data: {"status":"failed","reason":"MOMO_DECLINED","message":"Payment was not completed. Please try again.","retryable":true}

        event: timeout
        data: {"status":"timeout","message":"Payment timed out. Please try again."}
        ```

        | Event | `status` | When | Action |
        |---|---|---|---|
        | `pending` | `pending` | Immediately on connect | Confirm stream is open, await result |
        | `confirmed` | `confirmed` | Payment confirmed | Use `new_balance` to update the UI without a refetch, close stream |
        | `failed` | `failed` | Payment declined/errored | Show `message`; `retryable` is always `true` — a retry is a fresh `POST /topup` (new `topup_id`) |
        | `timeout` | `timeout` | No result within 3 minutes | Notify user, close stream, allow retry |

        The stream closes itself after emitting a terminal event (`confirmed`, `failed`, `timeout`).
        Clients should call `EventSource.close()` on receipt.

        ## Ownership

        `topup_id` must have been issued to the authenticated user by
        `POST /users/me/wallet/topup`. A `404` is returned for unknown or foreign IDs.

        ## Late connect / reconnect (no lost results)

        The terminal outcome is **persisted** (10-min TTL) in addition to being published.
        On connect the server subscribes and then replays any already-recorded terminal
        status immediately — so a client that connects (or reconnects) **after** the payment
        resolved still receives `confirmed`/`failed` at once, rather than waiting out the
        3-minute timeout. This matters because provider **failure** callbacks can be slow.
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - in: path
          name: topup_id
          required: true
          schema:
            type: string
            format: uuid
          example: d3f8a1b2-0000-0000-0000-000000000042
          description: The `topup_id` returned by `POST /users/me/wallet/topup`.
      responses:
        '200':
          description: |
            SSE stream opened successfully. The response body is a continuous stream of
            named events; it does **not** conform to standard JSON response shape.
          headers:
            Content-Type:
              schema:
                type: string
                example: text/event-stream
            Cache-Control:
              schema:
                type: string
                example: no-cache
            Connection:
              schema:
                type: string
                example: keep-alive
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Raw SSE stream. Each message is separated by a blank line.
                  Parse individual event payloads with `JSON.parse(event.data)`.
                  See the `TopupEvent` schema for the `data` field shape.
              example: |
                event: pending
                data: {"status":"pending"}

                event: confirmed
                data: {"status":"confirmed","amount":5000,"currency":"RWF","new_balance":15000,"message":"Your wallet has been topped up successfully."}

        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: '`topup_id` not found, expired, or not owned by the authenticated user.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example:
                error: { code: NOT_FOUND }

  /users/me/wallet/transactions:
    get:
      tags: [Wallet]
      summary: Own transaction history
      description: |
        Returns the authenticated user's wallet ledger — top-ups, ticket payments, and
        refunds — from the local `wallet_transactions` projection (fed by payment-service
        `wallet.events`). No synchronous call to the payment service is made.

        Only completed movements are recorded, so every row is a settled transaction
        (there is no `status` field; pending/failed top-ups never appear here).
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
        - in: query
          name: type
          schema: { type: string, enum: [topup, ticket_payment, refund] }
          description: Filter by transaction type (maps to the movement's `source`).
      responses:
        '200':
          description: Paginated transaction list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/invite:
    post:
      tags: [Users]
      summary: Invite a staff user
      description: |
        Creates an `Invitation` record (7-day expiry) and sends an invite link via SMS and/or email.
        At least one of `phone_number` or `email` must be provided.

        The invite link is constructed as:
        ```
        <APP_URL>/i?t=<raw_token>
        ```
        The invitee opens the link, the frontend calls `GET /auth/invite/validate?token=<t>` to
        pre-check the token, then `POST /users/accept-invite` with the raw token to activate their account.

        **Required permission:** `invite:User`

        Scoping rules (derived from the caller's `invite:User` grant):
        - `platform` scope — may specify any `org_id`, **or omit it** to invite an org-less
          user (any kind). However, if any assigned role carries an **org-scoped** grant
          (`subject:action:org`), an `org_id` referencing an active org is required, else
          `400 ORG_REQUIRED_FOR_ORG_SCOPED_ROLE`.
        - `org` scope — automatically scoped to the caller's own org; `org_id` is ignored.

        Roles are escalation-guarded: you can only assign roles whose grants you already
        hold (`403 GRANT_SCOPE_ESCALATION`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, role_slugs]
              properties:
                first_name:   { type: string, maxLength: 100 }
                last_name:    { type: string, maxLength: 100 }
                role_slugs:
                  type: array
                  minItems: 1
                  items: { type: string }
                  example: [dispatcher, driver]
                  description: One or more role slugs to assign. Each must match an existing non-passenger role.
                org_id:       { type: string, format: uuid, description: Target org. Ignored for org-admin callers. }
                email:        { type: string, format: email, maxLength: 255 }
                phone_number: { type: string, pattern: '^\+\d{7,15}$', description: E.164 format. }
                locale:
                  type: string
                  enum: [rw, en, fr]
                  default: rw
                  description: 'Language preference for the invitee. Stored on the invitation and applied to the user account when the invite is accepted. Defaults to `rw`.'
      responses:
        '201':
          description: Invitation created and sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite_token:
                    type: string
                    description: 'Raw invite token. The invite link is already sent via SMS/email in the format `<APP_URL>/i?t=<invite_token>`. This field is returned for reference only.'
                  expires_at: { type: string, format: date-time }
        '400':
          description: '`ORG_REQUIRED_FOR_ORG_SCOPED_ROLE` — an org-scoped role requires a target org.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: '`FORBIDDEN`, or `GRANT_SCOPE_ESCALATION`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: '`ROLE_NOT_FOUND`, or `ORG_NOT_FOUND` / `ORG_NOT_ACTIVE` for the target org.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ROLE_NOT_FOUND } }
        '409':
          description: 'Contact already registered (`PHONE_ALREADY_REGISTERED` / `EMAIL_ALREADY_REGISTERED`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /users/accept-invite:
    post:
      tags: [Users]
      summary: Accept a staff invitation (set password, trigger OTP)
      description: |
        Sets the user's password, creates the account in `pending_verification` status,
        and sends OTP(s) to the provided channel(s). The invitation's roles **and** any
        staged direct grants are applied to the new user, then the invitation is
        **deleted** (consumed) — there is no "accepted" record, so a re-used token returns
        `400 INVALID_TOKEN`.

        **Does not issue tokens.** After this call, the user must:
        1. Log in via `POST /auth/login` → receives `{ requires_verification: true, channel }`.
        2. Enter the OTP via `POST /auth/verify-login` → tokens issued.

        Alternatively: validate token first via `GET /auth/invite/validate`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:    { type: string, description: 'Raw invite token — the value of the `t` query parameter from the invite URL (`<APP_URL>/i?t=<token>`).' }
                password: { type: string, minLength: 8, maxLength: 128 }
      responses:
        '200':
          description: Account created — OTP(s) sent, proceed to login
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:  { type: string, example: 'Account created. Please verify your account to log in.' }
                  user_id:  { type: string, format: uuid }
                  channels: { type: array, items: { type: string, enum: [phone, email] }, example: [phone, email] }
        '400':
          description: Token invalid or already used (`INVALID_TOKEN`)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: INVALID_TOKEN } }
        '409':
          description: |
            Phone number (`PHONE_ALREADY_REGISTERED`) or email (`EMAIL_ALREADY_REGISTERED`)
            on the invitation is already registered to an existing user account.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '410':
          description: Invitation expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: TOKEN_EXPIRED } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /users/invitations:
    get:
      tags: [Users]
      summary: List pending invitations
      description: |
        Returns all invitations that have not yet been accepted.

        **Required permission:** `invite:User`

        Scoping rules:
        - `platform` scope — sees all orgs' invitations; optional `?org_id` filter applies.
        - `org` scope — sees only invitations for their own org.

        Each item includes an `expired` boolean derived from `expires_at` vs. now,
        so the frontend can surface "resend" actions for stale invites.
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 12, minimum: 1, maximum: 100 }
        - in: query
          name: org_id
          schema: { type: string, format: uuid }
          description: Platform scope only — filter by organization.
        - in: query
          name: q
          schema: { type: string, maxLength: 200 }
          description: Search by invitee name, email, or phone number (case-insensitive substring match).
      responses:
        '200':
          description: Paginated invitation list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:           { type: string, format: uuid }
                        first_name:   { type: string }
                        last_name:    { type: string }
                        email:        { type: string, format: email, nullable: true }
                        phone_number: { type: string, nullable: true }
                        role_slugs:
                          type: array
                          items: { type: string }
                          description: Roles assigned to this invitation.
                        org_id:       { type: string, format: uuid, nullable: true }
                        invited_by:   { type: string, format: uuid }
                        expires_at:   { type: string, format: date-time }
                        expired:      { type: boolean, description: true if expires_at is in the past. }
                        created_at:   { type: string, format: date-time }
                  total: { type: integer }
                  page:  { type: integer }
                  limit: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /users/invitations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Users]
      summary: Get a pending invitation (detail)
      description: |
        Returns a single pending invitation, including its roles and any staged direct
        grants. Backs the invitation detail/edit page.

        **Required permission:** `invite:User` (org-scope callers only their own org's invitations).

        > **Note:** an invitation is **deleted** the moment it is accepted — there is no
        > "accepted" state. An accepted, revoked, or unknown id all return `404 INVITE_NOT_FOUND`.
      responses:
        '200':
          description: Invitation detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationFull' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      tags: [Users]
      summary: Update a pending invitation
      description: |
        Edits fields on a pending invitation — name, phone, email, roles, locale.

        **Required permission:** `invite:User` (org-scope callers only their own org's invitations).

        Phone/email conflicts are checked against the `users` table only when the value changes.
        An org-less invitation may not take on **org-scoped roles** (`400 ORG_REQUIRED_FOR_ORG_SCOPED_ROLE`).
        An accepted/revoked invitation returns `404 INVITE_NOT_FOUND`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                first_name:   { type: string, maxLength: 100 }
                last_name:    { type: string, maxLength: 100 }
                email:        { type: string, format: email, maxLength: 255 }
                phone_number: { type: string, pattern: '^\+\d{7,15}$', description: E.164 format. }
                role_slugs:
                  type: array
                  minItems: 1
                  items: { type: string }
                  description: Replaces all current roles on the invitation. Each slug must match an existing non-passenger role.
                locale:       { type: string, enum: [rw, en, fr] }
      responses:
        '200':
          description: Updated invitation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationFull' }
        '400':
          description: '`ORG_REQUIRED_FOR_ORG_SCOPED_ROLE` — an org-less invitation cannot take org-scoped roles.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: '`FORBIDDEN`, or `GRANT_SCOPE_ESCALATION` (assigning roles whose grants the caller does not hold).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: 'Phone/email already registered to a user (`PHONE_ALREADY_REGISTERED` / `EMAIL_ALREADY_REGISTERED`).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

    delete:
      tags: [Users]
      summary: Revoke a pending invitation
      description: |
        Permanently deletes an invitation (cascades its roles + grants), preventing the
        invitee from ever using the link.

        **Required permission:** `invite:User` (org-scope callers only their own org's invitations).
        An accepted/revoked invitation returns `404 INVITE_NOT_FOUND`.
      responses:
        '204': { description: Invitation revoked. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/invitations/{id}/grants:
    put:
      tags: [Users]
      summary: Replace an invitation's direct grants
      description: |
        Replaces the set of **direct grants** staged on a pending invitation (advanced
        permissions, on top of role-based ones). They are materialised onto the user when
        the invitation is accepted.

        **Required permission:** `assign_role:User`. An empty `patterns` array clears all
        direct grants. Grants are escalation-guarded (`403 GRANT_SCOPE_ESCALATION` — you can
        only stage grants you already hold, which also hides `platform` scope from org-admins).
        An org-less invitation may not take **org-scoped** grants (`400 ORG_REQUIRED_FOR_ORG_SCOPED_ROLE`).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patterns]
              properties:
                patterns:
                  type: array
                  items: { type: string, example: 'user:read:org' }
                  description: 'Full desired grant set (subject:action:scope). Empty clears all.'
      responses:
        '200':
          description: Updated invitation (with the new grants).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InvitationFull' }
        '400':
          description: '`ORG_REQUIRED_FOR_ORG_SCOPED_ROLE` — org-scoped grant on an org-less invitation.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: '`FORBIDDEN` or `GRANT_SCOPE_ESCALATION`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /users/invitations/{id}/resend:
    post:
      tags: [Users]
      summary: Resend an invitation
      description: |
        Regenerates the invite token (invalidating the previous one) and resets
        `expires_at` to 7 days from now. Re-sends the invite link to all channels
        on the invitation (SMS and/or email).

        Works for both valid (not yet expired) and already-expired invitations —
        either way a fresh link is issued. An accepted/revoked invitation returns
        `404 INVITE_NOT_FOUND`.

        **Required permission:** `invite:User`

        Scoping: org-scope callers may only resend invitations belonging to their own org.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Token regenerated and invite re-sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_at: { type: string, format: date-time, description: New expiry — 7 days from now. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users:
    get:
      tags: [Users]
      summary: List users
      description: |
        **Required permission:** `read:User`

        Scoping rules (derived from the caller's `read:User` grant, not role name):
        - `platform` scope — sees all users; optional `?org_id` filter applies.
        - `org` scope — sees only users within their own org (scoped automatically).
        - `own` scope — sees only themselves.

        The `phone_number` field is masked (`+250788***456`) for non-platform callers.
        Query params are validated and coerced; bad values return `422 VALIDATION_ERROR`.
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 12, minimum: 1, maximum: 100 }
        - in: query
          name: status
          schema: { type: string, enum: [active, pending_verification, suspended, pending_deletion] }
        - in: query
          name: user_type
          schema: { type: string, enum: [passenger, staff] }
        - in: query
          name: org_id
          schema: { type: string, format: uuid }
          description: Platform admin only — filter by organization.
        - in: query
          name: role
          description: 'Filter by role slug. **Multi-select** — repeat the param (`?role=driver&role=cashier`) to match any of several roles.'
          style: form
          explode: true
          schema:
            type: array
            items: { type: string }
        - in: query
          name: q
          schema: { type: string, maxLength: 200 }
          description: Search by first name, last name, email, or phone number (case-insensitive substring match).
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/UserListItem' }
                  total: { type: integer, description: Total records matching the filters. }
                  page:  { type: integer }
                  limit: { type: integer }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Users]
      summary: Get user by ID
      description: |
        **Required permission:** `read:User`

        For `driver` and `passenger` roles the CASL rule carries condition `{ id: userId }`.
        The route gate passes (the rule exists), but the service returns `403` for any ID
        other than the caller's own.
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserFullProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

    patch:
      tags: [Users]
      summary: Update user by ID
      description: |
        **Required permission:** `update:User`

        Edits profile fields only. **Roles are assigned via `PUT /users/{id}/roles`**, and
        the avatar via `PATCH /users/me` — neither is accepted here.

        Field notes:
        - `status: suspended` — immediately blacklists all active access tokens in Redis
          (15 min TTL matching the JWT TTL) and sends a `security.account_suspended`
          notification to the target user via their `notif_channel` preference.
        - `org_id` — reassigns the user to a different org (`platform-admin` only).

        **Domain events** published to `logs` exchange → `user.events` routing key (staff users only):
        - `staff.updated` — when `first_name`, `last_name`, or `status` changes (includes `roles[]` and `status`)
        - `staff.suspended` — additionally fired when `status` set to `suspended`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                first_name:  { type: string, maxLength: 100 }
                last_name:   { type: string, maxLength: 100 }
                status:      { type: string, enum: [active, suspended], description: Suspended triggers Redis token blacklist and a push/SMS notification to the user. }
                org_id:      { type: string, format: uuid }
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserFullProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

    delete:
      tags: [Users]
      summary: Soft-delete user
      description: |
        **Required permission:** `delete:User`

        Scoping rules (derived from the caller's `delete:User` grant):
        - `platform` scope — can delete any user.
        - `org` scope — can only delete users within their own org.
        - `own` scope — can only delete themselves.

        Sets `status: pending_deletion` and `deleted_at`, revokes all active refresh tokens,
        and blacklists active access tokens in Redis for 15 min. **PII is anonymized
        immediately** (first/last name, email, phone, driver licence nulled/scrubbed) and the
        **avatar binary is deleted** from object storage; the row itself is retained for
        referential integrity. Nulling email/phone frees those unique slots for re-registration.
        The last platform admin cannot be deleted.
      responses:
        '204': { description: User soft-deleted — PII anonymized, avatar deleted, tokens revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{id}/roles:
    put:
      tags: [Users]
      summary: Replace a user's roles
      description: |
        Replaces a user's roles atomically (all current roles removed, then the given set
        applied).

        **Required permission:** `assign_role:User`. Escalation-guarded — you may only assign
        roles whose grants you already hold (`403 GRANT_SCOPE_ESCALATION`). Removing the last
        platform-admin's powers is blocked.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_slugs]
              properties:
                role_slugs:
                  type: array
                  items: { type: string }
                  example: [dispatcher, driver]
                  description: Full desired role set (slugs). Each must resolve to a role visible to the target user's org.
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserFullProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: '`FORBIDDEN` or `GRANT_SCOPE_ESCALATION`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: '`USER_NOT_FOUND` or `ROLE_NOT_FOUND`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

  /users/{id}/wallet/transactions:
    get:
      tags: [Wallet]
      summary: User transaction history (admin)
      description: |
        Returns the wallet ledger for any user by ID, from the local `wallet_transactions`
        projection. Requires `read:User`. Same response shape as the own-history endpoint.
      security:
        - BearerAuth: []
        - CookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
          description: ID of the user whose transactions to retrieve.
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
        - in: query
          name: type
          schema: { type: string, enum: [topup, ticket_payment, refund] }
      responses:
        '200':
          description: Paginated transaction list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /users/{id}/grants:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: User ID

    post:
      tags: [Users]
      summary: Add direct grants to a user
      description: |
        Adds one or more grant patterns directly to a user, bypassing roles.
        Patterns are compressed at save time.

        **Required permission:** `assign_role:User`

        Scoping:
        - `platform` scope — can grant to any user.
        - `org` scope — own-org users only; `platform`-scoped patterns are rejected with `403 GRANT_SCOPE_ESCALATION`.

        Changes take effect on the user's **next token refresh**.

        Fires a `staff.updated` domain event (`logs` exchange → `user.events`) for staff users,
        including the full updated `roles[]` and `status` in the payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patterns]
              properties:
                patterns:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^[\w*][\w_*]*:[\w*]+:(own|org|platform)$'
                    example: 'audit_log:read:org'
                  description: 'Grant patterns in `subject:action:scope` format. Use `GET /permissions` for valid subjects and actions.'
      responses:
        '200':
          description: Updated user profile (includes refreshed `grants` array)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserFullProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Forbidden or privilege escalation attempt
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: GRANT_SCOPE_ESCALATION } }
        '404': { $ref: '#/components/responses/NotFound' }
        '422':
          description: Invalid pattern format or unknown subject/action
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: INVALID_GRANT_PATTERN } }

  /users/{id}/grants/{grantId}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: User ID
      - in: path
        name: grantId
        required: true
        schema: { type: string, format: uuid }
        description: Grant ID (from the user's `grants` array in `GET /users/:id`)

    delete:
      tags: [Users]
      summary: Remove a direct grant from a user
      description: |
        **Required permission:** `assign_role:User`

        Changes take effect on the user's **next token refresh**.

        Fires a `staff.updated` domain event (`logs` exchange → `user.events`) for staff users,
        including the full updated `roles[]` and `status` in the payload.
      responses:
        '204': { description: Grant removed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: '`GRANT_NOT_FOUND` (or user not found).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  ROLES                                                                   ║
  # ║  Manage role definitions and their grant patterns.                       ║
  # ║  Order: list → create → read → update → delete → grants                 ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  /roles:
    get:
      tags: [Roles]
      summary: List roles
      description: |
        **Staff only.** No additional permission required — any authenticated staff member may call this.
        Passengers are rejected with `403`.

        Scoping rules:
        - `platform-admin` — sees all roles (global and org-scoped), including the `passenger` system role.
          Optional `?org_id` query parameter filters to a specific org.
        - All other staff — sees global role templates (`org_id = null`) plus their own org's roles.
          The `passenger` system role is excluded.
      parameters:
        - in: query
          name: org_id
          schema: { type: string, format: uuid }
          description: Platform admin only — filter by organization.
        - in: query
          name: q
          schema: { type: string, maxLength: 200 }
          description: Search by role name (case-insensitive substring match).
      responses:
        '200':
          description: List of roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Caller is a passenger (staff required), content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

    post:
      tags: [Roles]
      summary: Create a role
      description: |
        **Required permission:** `create:Role`

        Creates a new role with the supplied grant patterns. Patterns must be valid
        entries from the permission catalog (`GET /permissions`) combined with a valid scope.

        `org-admin` callers may only assign patterns with scope `own` or `org` — not `platform`.
        The role is scoped to the caller's org automatically.

        `platform-admin` callers may create platform-wide roles (omit `org_id`) or org-scoped
        roles (include `org_id`).

        Duplicate slug returns `409`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, patterns]
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: 'Document Reviewer'
                slug:
                  type: string
                  maxLength: 100
                  pattern: '^[a-z0-9-]+$'
                  description: Auto-generated from name if omitted.
                  example: 'document-reviewer'
                org_id:
                  type: string
                  format: uuid
                  description: '`platform-admin` only — scope the role to a specific org. Omit for a platform-wide role.'
                patterns:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^[\w*][\w_*]*:[\w*]+:(own|org|platform)$'
                    example: 'user:read:org'
                  description: Grant patterns in `subject:action:scope` format. Use `GET /permissions` for valid subjects and actions.
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Forbidden or privilege escalation attempt (scope exceeds caller's max scope)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: GRANT_SCOPE_ESCALATION } }
        '409':
          description: Role slug already exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ROLE_ALREADY_EXISTS } }
        '422':
          description: Invalid pattern format or unknown subject/action
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: INVALID_GRANT_PATTERN, message: '"user:badaction:org" is not a valid grant pattern' } }

  /roles/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Roles]
      summary: Get role by ID
      description: |
        **Staff only.** No additional permission required — any authenticated staff member may call this.
        Passengers are rejected with `403`.

        Scoping rules:
        - `platform-admin` — can fetch any role, including the `passenger` system role.
        - All other staff — can fetch global role templates (`org_id = null`) or roles belonging to
          their own org. Attempting to fetch another org's role or the `passenger` role returns `403`.
      responses:
        '200':
          description: Role detail with all grants
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: |
            Caller is a passenger, or the role belongs to a different org, or the role is the
            `passenger` system role (not visible to non-platform-admin staff).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Role not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ROLE_NOT_FOUND } }

    patch:
      tags: [Roles]
      summary: Update a role's name or description
      description: |
        **Required permission:** `update:Role`

        Updates `name` (display label) and/or `description`. At least one field is required.

        **The slug is immutable.** Changing `name` does not change the slug — the slug is set at
        creation time and frozen. It is embedded in user JWTs and `role_slugs` records; renaming it
        would silently break all references. To change the slug, delete and recreate the role.

        To change grants, use `POST /roles/{id}/grants` or `DELETE /roles/{id}/grants/{grantId}`.

        **Copy-on-write:** `is_managed` is not a freeze. An `org-admin` editing a global template
        (`org_id: null`) or a managed role silently **forks an org-scoped copy** and edits that;
        `platform-admin` edits in place. There is **no** `MANAGED_ROLE_IMMUTABLE` error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:        { type: string, maxLength: 100, example: 'Senior Document Reviewer' }
                description: { type: string, maxLength: 500, nullable: true, example: 'Reviews submitted documents before approval.' }
      responses:
        '200':
          description: Updated role (the org's fork when copy-on-write applied).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Role not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ROLE_NOT_FOUND } }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }

    delete:
      tags: [Roles]
      summary: Delete a role
      description: |
        **Required permission:** `delete:Role`

        **Copy-on-write:** an `org-admin` "deleting" a global template/default **tombstones an
        org-scoped override** (hidden for their org only; the shared default is untouched);
        platform admins hard-delete. There is **no** `MANAGED_ROLE_IMMUTABLE` error.

        Users currently assigned this role lose the join record immediately (cascade delete).
        Their JWT still carries the old rules until the token expires (~15 min). The users
        themselves are **not** deleted.

        Deletion is blocked (`409 ROLE_HAS_PENDING_INVITATIONS`) if any pending invitations
        reference this role. Resolve or revoke those invitations first.
      responses:
        '204': { description: Role deleted (or org-tombstoned) — user assignments cascade-removed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Role not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ROLE_NOT_FOUND } }
        '409':
          description: One or more pending invitations reference this role and have not yet been accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ROLE_HAS_PENDING_INVITATIONS } }

  /roles/{id}/grants:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }

    post:
      tags: [Roles]
      summary: Add grants to a role
      description: |
        **Required permission:** `update:Role`

        Adds one or more grant patterns to the role. Patterns already covered by an existing
        wildcard are silently ignored (idempotent). Patterns are compressed at save time
        (e.g. all actions for a subject → `subject:*:scope`).

        **Copy-on-write:** editing a global template/managed role's grants forks an org-scoped
        copy first (no `MANAGED_ROLE_IMMUTABLE`). Escalation-guarded: you may only add grants you
        already hold (`403 GRANT_SCOPE_ESCALATION`).

        Grant changes take effect on the user's **next token refresh** — not immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patterns]
              properties:
                patterns:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^[\w*][\w_*]*:[\w*]+:(own|org|platform)$'
                    example: 'audit_log:read:org'
                  description: 'Grant patterns in `subject:action:scope` format. Use `GET /permissions` for valid subjects and actions.'
      responses:
        '200':
          description: Role with the new grant added (or unchanged if already present)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: '`FORBIDDEN` or `GRANT_SCOPE_ESCALATION`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Role not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: ROLE_NOT_FOUND } }
        '422':
          description: Invalid pattern
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: INVALID_GRANT_PATTERN } }

  /roles/{id}/grants/{grantId}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: Role ID
      - in: path
        name: grantId
        required: true
        schema: { type: string, format: uuid }
        description: Grant ID (from the role's `grants` array)

    delete:
      tags: [Roles]
      summary: Remove a grant from a role
      description: |
        **Required permission:** `update:Role`

        **Copy-on-write:** removing a grant from a global template/managed role forks an
        org-scoped copy without that grant (no `MANAGED_*_IMMUTABLE` error).

        Changes take effect on the user's **next token refresh**.
      responses:
        '204': { description: Grant removed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Role or grant not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: { code: GRANT_NOT_FOUND } }

  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║  PERMISSIONS                                                             ║
  # ║  Read-only catalog of valid (subject, action) pairs.                    ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  /permissions:
    get:
      tags: [Permissions]
      summary: List permission catalog
      description: |
        **Staff only.** No additional permission required — any authenticated staff member may call this.
        Passengers are rejected with `403`.

        Returns all valid `(subject, action)` pairs recognized by the platform, ordered by
        `group → subject → action`. Use this to build the pattern picker UI when creating
        or editing roles — never allow free-text pattern entry.

        The `code` field is the canonical `subject:action` string. Combine it with a scope
        suffix to form a grant pattern: `"{code}:{scope}"` → e.g. `"user:read:org"`.

        Each permission includes a `scopes` array listing which scope suffixes are valid for
        that permission. Only offer those scopes in the UI — e.g. `org:create` only allows
        `platform`, so offering `own` or `org` would produce an invalid pattern.
      responses:
        '200':
          description: Full permission catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Permission' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Caller is a passenger (staff required), content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /banks:
    get:
      tags: [Banks]
      summary: List banks
      description: |
        **Public — no authentication required.**

        Returns all banks (active and inactive). Use `is_active` to filter in the UI —
        only offer active banks for new selections; inactive ones are shown for existing
        org records that still reference them.
      responses:
        '200':
          description: Bank list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Bank' }
    post:
      tags: [Banks]
      summary: Create a bank
      description: |
        **Platform staff only** — requires `manage:Org:platform`.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 100, example: 'Equity Bank Rwanda' }
      responses:
        '201':
          description: Bank created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Bank' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A bank with this name already exists
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /banks/{id}:
    patch:
      tags: [Banks]
      summary: Update a bank
      description: |
        **Platform staff only** — requires `manage:Org:platform`.

        Use `is_active: false` to soft-delete a bank (it stays in the list so existing
        org records referencing it are not broken, but it should not be offered for new selections).
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:      { type: string, maxLength: 100, example: 'Equity Bank Rwanda' }
                is_active: { type: boolean, description: 'Set to false to deactivate the bank.' }
      responses:
        '200':
          description: Updated bank
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Bank' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Name conflicts with another bank
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    delete:
      tags: [Banks]
      summary: Soft-delete a bank
      description: |
        **Platform staff only** — requires `manage:Org:platform`.

        Sets `is_active = false`. Does **not** remove the bank or break existing org references.
        Prefer `PATCH /{id}` with `is_active: false` if you also need to rename at the same time.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Bank deactivated }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
